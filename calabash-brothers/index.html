.power-fill { background: linear-gradient(90deg, #ffd700, #ffed4a); }
.brave-fill { background: linear-gradient(90deg, #4ecdc4, #7ee8e0); }
.karma-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }

.stat-num { width: 100px; text-align: right; font-size: 16px; font-weight: bold; }

.choice-btn { padding: 14px 24px; background: linear-gradient(135deg, #3a3a5a, #2a2a4a); border: 2px solid #555; border-radius: 12px; color: #fff; font-size: 18px; cursor: pointer; transition: all 0.2s; }

#actions { display: flex; justify-content: center; gap: 20px; padding: 18px; background: rgba(0,0,0,0.5); border-top: 1px solid #333; flex-shrink: 0; }

.btn-fight { background: linear-gradient(135deg, #ff6b6b, #cc4444); border-color: #ff8888; color: #fff; }

.btn-rest { background: linear-gradient(135deg, #ffd700, #cc9900); border-color: #ffed4a; color: #333; }

.char-card { width: 140px; padding: 20px 15px; background: linear-gradient(135deg, #2a2a4a, #1a1a3a); border: 2px solid #555; border-radius: 14px; cursor: pointer; transition: all 0.3s; }

let player = null, boss = null, turn = 1, logEntries = [];
let winStreak = 0; // 连胜计数

function initGame(charId) {
  player = { char: characters[charId], hp: 80, maxHp: 80, power: 8 + charId, maxPower: 80, brave: 20, karma: 0, skills: [characters[charId].skill] };
  boss = { hp: 200, maxHp: 200, power: 35, maxPower: 80, brave: 80, growRate: 1.1 };
  turn = 1; logEntries = []; window.isIdle = false;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('actions').style.opacity = '0.5';
  document.getElementById('actions').style.pointerEvents = 'none';
  updateUI(); showEvent('intro');
}

function updateUI() {
  document.getElementById('turn').textContent = '回合 ' + turn;
  const warn = document.getElementById('boss-warning');
  if (turn >= 15) warn.textContent = '💀 蛇精即将变得无法战胜！';
  else if (turn >= 10) warn.textContent = '⚠️ 蛇精越来越强了...';
  else if (turn >= 6) warn.textContent = '⚠️ 时间紧迫...';
  else warn.textContent = '';

  document.getElementById('playerStats').innerHTML = `
    <div class="stat-row"><span class="stat-name">生命</span><div class="stat-bar"><div class="stat-fill hp-fill" style="width:${Math.round(player.hp/player.maxHp*100)}%"></div></div><span class="stat-num">${Math.round(player.hp)}/${Math.round(player.maxHp)}</span></div>

    <div style="margin-top:8px; padding:8px; background:rgba(255,107,107,0.1); border-radius:4px;">
      <div style="color:#ff6b6b; font-size:14px; font-weight:bold;">📍 蛇精动态</div>
      <div style="color:#aaa; font-size:14px; margin-top:4px;">${boss.lastAction || '正在修炼中...'}</div>
    </div>`;

  const ratio = player.power / boss.power;
  const analysis = document.getElementById('bossAnalysis');
  if (ratio >= 1.1) { analysis.textContent = '✅ 可以一战！'; analysis.style.color = '#4ecdc4'; }
  else if (ratio >= 0.9) { analysis.textContent = '⚠️ 有风险但可试'; analysis.style.color = '#ffd700'; }
  else if (ratio >= 0.7) { analysis.textContent = '❌ 实力不足'; analysis.style.color = '#ff8844'; }
  else { analysis.textContent = '💀 几乎不可能赢'; analysis.style.color = '#ff6b6b'; }

  let sh = '<div style="color:#eee; font-size:15px; font-weight:bold; margin-bottom:6px;">已找到的兄弟 (' + player.skills.length + '/7)：</div>';
  player.skills.forEach(s => { 
    const brother = characters.find(c => c.skill === s);
    sh += `<span class="skill-tag skill-active" style="background:${brother.color}33; border-color:${brother.color}">${brother.icon} ${brother.name}</span>`; 
  });
  const missing = allSkills.filter(s => !player.skills.includes(s));
  if (missing.length > 0) {
    sh += '<div style="color:#eee; font-size:15px; font-weight:bold; margin-top:10px; margin-bottom:6px;">未找到：</div>';
    missing.forEach(s => { sh += `<span class="skill-tag">???</span>`; });
  }
  document.getElementById('skills').innerHTML = sh;
  document.getElementById('log').innerHTML = logEntries.slice(-4).map(e => `<div style="font-size:13px;color:${e.color};padding:4px 0;">${e.text}</div>`).join('');
}

function addLog(text, color) { logEntries.push({ text, color: color || '#666' }); }

function typeText(text, callback) {
  let idx = 0; document.getElementById('text').textContent = '';
  const iv = setInterval(() => { if (idx < text.length) { document.getElementById('text').textContent += text[idx]; idx++; } else { clearInterval(iv); if (callback) callback(); } }, 18);
}

function showText(speaker, text, choices) {
  document.getElementById('speaker').textContent = speaker;
  document.getElementById('choices').innerHTML = '';
  typeText(text, () => {
    // If the only choice is to continue exploring, we don't render the button.
    // Instead, we just apply its effect and enter idle state.
    if (choices && choices.length === 1 && choices[0].next === 'explore') {
      const c = choices[0];
      if (c.data) events._tempData = c.data;
      if (c.effect) applyEffect(c.effect); 
      updateUI();
      
      window.isIdle = true;
      document.getElementById('actions').style.opacity = '1';
      document.getElementById('actions').style.pointerEvents = 'auto';
      return;
    }

    if (choices && choices.length > 0) {
      const div = document.getElementById('choices');
      choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn'; btn.textContent = c.text;
        btn.onclick = () => { 
          if (c.data) events._tempData = c.data;
          if (c.effect) applyEffect(c.effect); 
          if (c.next) showEvent(c.next); 
          updateUI(); 
        };
        div.appendChild(btn);
      });
    }
  });
}

function checkDeath() {
  if (player.hp <= 0) {
    const deathTexts = [
      `你的生命值降到了0...\n\n${player.char.name}倒在了地上，意识渐渐模糊...\n\n「爷爷...我...对不起...」\n\n你的冒险就这样结束了...`,
      `${player.char.name}再也撑不住了...\n\n「不...还差一点...就能救出爷爷了...」\n\n你倒在了冰冷的地上...`,
      `你的身体已经到达极限...\n\n葫芦开始发出微弱的光芒，仿佛在为你哭泣...\n\n${player.char.name}闭上了眼睛...`
    ];
    showText('💀 你倒下了', deathTexts[Math.floor(Math.random() * deathTexts.length)], [
      { text: '🔄 重新开始', next: 'restart' }
    ]);
    return true;
  }
  return false;
}

function applyEffect(e) {
  let changes = [];
  
  // 处理生命值 - 可以死亡
  if (e.hp) {
    player.hp = player.hp + e.hp;
    
    // 如果生命值超过上限，提升上限
    if (player.hp > player.maxHp) {
      const increase = Math.floor((player.hp - player.maxHp) * 0.1);
      player.maxHp += increase;
      player.hp = player.maxHp;
      changes.push(`❤️ 生命上限 +${increase}！达到 ${Math.round(player.maxHp)}`);
    } else if (e.hp > 0) {
      changes.push(`❤️ 生命 +${e.hp} (${Math.round(player.hp)}/${Math.round(player.maxHp)})`);
    } else {
      changes.push(`💔 生命 ${e.hp} (${Math.round(Math.max(0, player.hp))}/${Math.round(player.maxHp)})`);
    }
  }
  
  // 处理战力 - 可以突破上限
  if (e.power) {
    player.power = Math.max(0, player.power + e.power);
    // 如果战力超过上限，提升上限
    if (player.power > player.maxPower) {
      const increase = Math.floor(player.power * 0.1);
      player.maxPower += increase;
      player.power = player.maxPower;
      changes.push(`⚔️ 战力上限 +${increase}！达到 ${Math.round(player.maxPower)}`);
    } else {
      changes.push(`⚔️ 战力 ${e.power > 0 ? '+' : ''}${e.power} (${Math.round(player.power)}/${Math.round(player.maxPower)})`);
    }
  }
  
  // 处理勇气
  if (e.brave) {
    player.brave = Math.max(0, Math.min(100, player.brave + e.brave));
    changes.push(`💪 勇气 ${e.brave > 0 ? '+' : ''}${e.brave} (${Math.round(player.brave)}/100)`);
  }
  
  // 处理善恶
  if (e.karma) {
    player.karma += e.karma;
    changes.push(`✨ 善恶 ${e.karma > 0 ? '+' : ''}${e.karma} (${player.karma >= 0 ? '+' : ''}${Math.round(player.karma)})`);
  }
  
  // 处理技能 - 每获得一个技能提升上限
  if (e.skill && !player.skills.includes(e.skill)) {
    player.skills.push(e.skill);
    player.maxHp += 15; // 每个技能增加15点生命上限
    player.maxPower += 10; // 每个技能增加10点战力上限
    player.hp = Math.min(player.maxHp, player.hp + 10); // 同时恢复一些生命
    changes.push(`🌟 获得技能：${e.skill}`);
    changes.push(`📈 属性上限提升！生命上限+15→${player.maxHp}，战力上限+10→${player.maxPower}`);
  }
  
  // 处理Boss伤害
  if (e.bossHp) boss.hp = Math.max(0, boss.hp + e.bossHp);
  if (e.bossPower) boss.power = Math.max(0, Math.min(boss.maxPower, boss.power + e.bossPower));
  
  return changes;
}

function showFeedback(changes) {
  if (!changes || changes.length === 0) return '';
  return '\n\n━━━━━━━━━━━━━━━━━━\n📊 属性变化：\n' + changes.join('\n') + '\n━━━━━━━━━━━━━━━━━━';
}

function growBoss() {
  // Boss基础成长：每回合不仅增加属性，也提升上限
  const baseGain = Math.floor(boss.power * 0.08 + turn * 0.5);
  boss.maxPower += 2;
  boss.maxHp += 5;
  boss.power = Math.min(boss.maxPower, boss.power + baseGain);
  boss.hp = Math.min(boss.maxHp, boss.hp + 10);
  boss.lastAction = `修炼中... 战力+${baseGain}`;
  addLog(`🐍 蛇精修炼中...战力+${baseGain}，上限提升`, '#ff6b6b');
  
  // 蛇精偶遇事件（增加概率和结盟事件）
  const bossEvent = Math.random();
  if (bossEvent < 0.08) { // 提高结盟概率，因为反派变多了
    // 🤝 新增：反派大妖结盟事件
    const villains = ['黑熊精', '金角大王', '银角大王', '黄袍怪', '白骨精', '牛魔王', '红孩儿', '六耳猕猴', '蝎子精', '百眼魔君', 
                      '广场舞大妈（魔化）', '键盘侠统领', '加班怨灵', '永远晚点的公交车精', '容嬷嬷', '复读机成精', '杠精转世', '甲方爸爸的化身', '五仁月饼怪', '没带纸的厕所幽灵'];
    const villain = villains[Math.floor(Math.random() * villains.length)];
    const hpMaxGain = Math.floor(Math.random() * 30) + 20;
    const powerMaxGain = Math.floor(Math.random() * 15) + 10;
    boss.maxHp += hpMaxGain;
    boss.maxPower += powerMaxGain;
    boss.hp += hpMaxGain;
    boss.power += powerMaxGain;
    boss.lastAction = `与【${villain}】结盟！`;
    addLog(`🤝 蛇精与${villain}结盟！生命上限+${hpMaxGain}，战力上限+${powerMaxGain}！`, '#ff4444');
  } else if (bossEvent < 0.12) {
    // 💥 蛇精遇到强敌，两败俱伤
    const damage = Math.floor(Math.random() * 30) + 20;
    boss.hp = Math.max(30, boss.hp - damage);
    boss.maxPower += 5;
    boss.power = Math.min(boss.maxPower, boss.power + 15);
    boss.lastAction = `与神秘强者激战！`;
    addLog(`💥 蛇精与神秘强者激战！生命-${damage}，但战力上限+5！`, '#ff8800');
  } else if (bossEvent < 0.18) {
    // 🎁 蛇精获得神秘法器
    const artifacts = ['千年蛇丹', '妖王内丹', '毒蛇胆', '蛇皮护甲', '魔蛇之眼', '灭霸的无限手套', '伏地魔的魔杖', '东方不败的绣花针', '恶毒王后的毒苹果', '容嬷嬷的银针', '夜王的长矛', '死神海拉的夜空之剑'];
    const artifact = artifacts[Math.floor(Math.random() * artifacts.length)];
    const hpGain = Math.floor(Math.random() * 25) + 15;
    const powerGain = Math.floor(Math.random() * 10) + 5;
    boss.maxHp += Math.floor(hpGain / 2);
    boss.maxPower += Math.floor(powerGain / 2);
    boss.hp = Math.min(boss.maxHp, boss.hp + hpGain);
    boss.power = Math.min(boss.maxPower, boss.power + powerGain);
    boss.lastAction = `获得了${artifact}！`;
    addLog(`🎁 蛇精找到了${artifact}！生命上限+${Math.floor(hpGain/2)}，战力上限+${Math.floor(powerGain/2)}！`, '#9b59b6');
  } else if (bossEvent < 0.23) {
    // 😈 蛇精蛊惑了无辜
    const victims = ['村民', '商人', '书生', '农夫', '猎人'];
    const victim = victims[Math.floor(Math.random() * victims.length)];
    const powerGain = Math.floor(Math.random() * 8) + 3;
    boss.maxPower += Math.floor(powerGain / 2);
    boss.power = Math.min(boss.maxPower, boss.power + powerGain);
    boss.lastAction = `吸取了${victim}的精气！`;
    addLog(`😈 蛇精蛊惑了${victim}，吸取精气！战力上限+${Math.floor(powerGain/2)}`, '#ff8800');
  } else if (bossEvent < 0.28) {
    // 🐍 蛇精遇到手下
    const minions = ['小妖精', '蜘蛛精', '蝙蝠怪', '蛤蟆精', '蛇妖'];
    const minion = minions[Math.floor(Math.random() * minions.length)];
    const gainBonus = Math.floor(Math.random() * 6) + 2;
    boss.maxPower += 2;
    boss.power = Math.min(boss.maxPower, boss.power + gainBonus);
    boss.lastAction = `收服了${minion}！`;
    addLog(`🐍 蛇精收服了${minion}！战力上限+2`, '#ff6b6b');
  } else if (bossEvent < 0.32) {
    // 😵 蛇精走火入魔
    const moodLoss = Math.floor(Math.random() * 10) + 5;
    boss.power = Math.max(10, boss.power - moodLoss);
    boss.lastAction = `修炼走火入魔！`;
    addLog(`😵 蛇精修炼走火入魔！战力-${moodLoss}`, '#4ecdc4');
  } else if (bossEvent < 0.38) {
    // 💪 蛇精怒气爆发
    const 怒气Gain = Math.floor(Math.random() * 12) + 8;
    boss.maxPower += 5;
    boss.power = Math.min(boss.maxPower, boss.power + 怒气Gain);
    boss.brave = Math.min(100, boss.brave + 10);
    boss.lastAction = `怒气爆发！`;
    addLog(`💪 蛇精怒气爆发！战力上限+5，气势+10！`, '#ff4444');
  }
}

  enemy_encounter: () => {
    const e = enemies[Math.floor(Math.random() * enemies.length)];
    const powerRatio = player.power / e.power;
    
    // 根据实力对比显示不同信息
    let difficulty = '';
    if (powerRatio >= 1.5) difficulty = '🟢 轻松碾压';
    else if (powerRatio >= 1.1) difficulty = '🟡 有优势';
    else if (powerRatio >= 0.9) difficulty = '🟠 势均力敌';
    else if (powerRatio >= 0.7) difficulty = '🔴 有风险';
    else difficulty = '💀 危险！';
    
    const strategies = [
      { text: `⚔️ 正面迎战`, effect: { hp: -e.power * 0.3, power: 3, brave: 5 }, successRate: Math.min(0.95, powerRatio * 0.8) },
      { text: `🎯 偷袭弱点`, effect: { hp: -e.power * 0.2, power: 5 }, condition: player.skills.includes('隐身'), successRate: 0.9 },
      { text: `🔥 火焰攻击`, effect: { hp: -e.power * 0.15, power: 4 }, condition: player.skills.includes('喷火'), successRate: 0.85 },
      { text: `💪 蛮力碾压`, effect: { hp: -e.power * 0.1, power: 6 }, condition: player.skills.includes('力大无穷'), successRate: Math.min(0.95, powerRatio * 1.2) },
      { text: `👀 侦查敌情`, effect: { power: 2 }, condition: player.skills.includes('千里眼'), successRate: 1 },
      { text: `🛡️ 铜墙铁壁`, effect: { hp: -e.power * 0.05, power: 4 }, condition: player.skills.includes('铜头铁臂'), successRate: 0.95 },
      { text: `💧 水幕护体`, effect: { hp: -e.power * 0.08, power: 3, hp: 5 }, condition: player.skills.includes('吸水'), successRate: 0.9, desc: '用水流抵挡伤害' },
      { text: `🏺 宝葫芦收妖`, effect: { hp: -e.power * 0.25, power: 8 }, condition: player.skills.includes('宝葫芦'), successRate: 0.92, desc: '用宝葫芦直接收服敌人' },
      { text: `💨 战术撤退`, effect: { hp: -2, brave: -2 }, successRate: 1 }
    ].filter(s => !s.condition || s.condition);
    
    showText(e.name, `⚔️ ${e.desc}！\n\n${difficulty}\n敌人战力：${Math.round(e.power)} | 敌人生命：${Math.round(e.hp)}\n你的战力：${Math.round(player.power)}`, strategies.map(s => ({
      text: s.text,
      next: 'combat_result',
      effect: s.effect,
      data: { enemy: e, successRate: s.successRate }
    })));
  },

    ]);
  },

  lucky_event: () => {
    const r = Math.random();
    // 20%概率触发特殊大事件
    if (r < 0.08) {
      // 💥 奇遇：力量暴涨
      const bonus = Math.floor(Math.random() * 20) + 15;
      player.power = Math.min(player.maxPower, player.power + bonus);
      showText('💥 奇遇！', `你误入了一个神秘洞穴，发现了一颗千年内丹！\n\n战力瞬间暴涨 +${bonus}！\n\n「这股力量...太强了！」`, [{ text: '🎉 太棒了', next: 'explore', effect: {} }]);
    } else if (r < 0.15) {
      // 💀 灾难：身受重伤
      const damage = Math.floor(player.hp * 0.5);
      player.hp = Math.max(1, player.hp - damage);
      showText('💀 灾难！', `你踩到了一个古老的诅咒陷阱！\n\n生命值骤降 -${damage}！\n\n「不...这怎么可能...」`, [{ text: '😤 坚持住', next: 'explore', effect: { brave: 10 } }]);
    } else if (r < 0.22) {
      // 🎁 获得神秘法器
      const artifacts = [
        { name: '⚔️ 上古神剑', power: 25, desc: '一把散发寒光的神剑！战力+25！' },
        { name: '🛡️ 金刚护盾', hp: 50, desc: '一个金色护盾！生命+50！' },
        { name: '🔮 魔法水晶', power: 15, hp: 20, desc: '一颗神秘水晶！战力+15，生命+20！' },
        { name: '💊 九转金丹', hp: 80, desc: '一颗金丹！生命直接回满！' },
        { name: '📖 天书秘籍', power: 30, desc: '一本古老秘籍！战力+30！' },
        { name: '⚔️ 倚天剑', power: 35, desc: '武林至尊，宝刀屠龙，号令天下，莫敢不从！战力+35！' },
        { name: '🪓 屠龙刀', power: 40, desc: '一把沉甸甸的黑色大刀，蕴含着无尽的煞气！战力+40！' },
        { name: '🐒 如意金箍棒', power: 50, desc: '重达一万三千五百斤的定海神针！战力+50！' },
        { name: '🪭 芭蕉扇', power: 30, desc: '一扇熄火，二扇生风，三扇下雨！战力+30！' },
        { name: '💍 至尊魔戒', power: 25, hp: -10, desc: '一枚统御众戒的魔戒！战力+25，但会反噬生命-10！' },
        { name: '⚡ 雷神之锤', power: 45, desc: '只有被认可的人才能举起的锤子！战力+45！' },
        { name: '🛡️ 美国队长的盾牌', hp: 60, desc: '振金打造的绝对防御！生命+60！' },
        { name: '💊 九转大肠', hp: 80, desc: '保留了一部分原味的九转大肠...吃了生命+80！' },
        { name: '📖 九阴真经', power: 35, desc: '天下武学总纲！战力+35！' },
        { name: '✨ 仙豆', hp: 100, desc: '卡林塔的神奇豆子，吃一颗满血复活！生命+100！' }
      ];
      const artifact = artifacts[Math.floor(Math.random() * artifacts.length)];
      showText(artifact.name, `你发现了一个神秘宝箱！\n\n打开后里面是...${artifact.name}！\n\n${artifact.desc}`, 
        [{ text: '🎉 收下', next: 'explore', effect: { power: artifact.power || 0, hp: artifact.hp || 0 } }]);
    } else if (r < 0.28) {
      // 🎭 遇到骗子
      showText('🎭 神秘人', '一个神秘人出现，声称要给你力量...\n\n但你感觉不太对劲...', [
        { text: '🤝 相信他', next: 'explore', effect: Math.random() < 0.5 ? { power: 12 } : { hp: -30, power: -10 } },
        { text: '🚫 警惕拒绝', next: 'explore', effect: { brave: 8 } }
      ]);
    } else if (r < 0.35) {
      // ⚡ 意外触发机关
      showText('⚡ 意外！', '你意外触发了一个古老机关！\n\n一道光芒闪过...', [
        { text: '✨ 接受洗礼', next: 'explore', effect: { power: Math.floor(Math.random() * 10) + 5, hp: Math.floor(Math.random() * 20) + 10 } },
        { text: '🏃 赶紧跑', next: 'explore', effect: { brave: 5 } }
      ]);
    } else {
      // 普通幸运事件
      const luckies = [
        { name: '🍀 幸运草', effect: { hp: 12, power: 3 } },
        { name: '💰 宝箱', effect: { power: 6, hp: 8 } },
        { name: '🌟 灵泉', effect: { hp: 20 } },
        { name: '📜 秘籍', effect: { power: 8 } },
        { name: '🔮 法杖', effect: { power: 5, hp: 10 } },
        { name: '💎 宝石', effect: { power: 7 } },
        { name: '🎁 礼物', effect: { hp: 15, power: 4 } },
        { name: '📱 诺基亚手机', effect: { hp: 25, power: 5 } },
        { name: '🍳 灰太狼的平底锅', effect: { power: 15, hp: 5 } },
        { name: '🥤 肥宅快乐水', effect: { hp: 30, brave: 5 } },
        { name: '🥿 妈妈的拖鞋', effect: { power: 20 } },
        { name: '🔦 哆啦A梦的缩小电筒', effect: { power: 12, brave: 10 } }
      ];
      const l = luckies[Math.floor(Math.random() * luckies.length)];
      showText(l.name, '你发现了好东西！', [{ text: '🎉 太好了', next: 'explore', effect: l.effect }]);
    }
  },

  rest_spot: () => {
    const restDescs = [
      '你找到了一个隐蔽的山洞，洞口被藤蔓遮挡着...\n\n这里很安全，可以好好休息一下。',
      '你发现了一片宁静的竹林，微风轻轻吹过...\n\n是个休息的好地方。',
      '你找到了一个废弃的猎人小屋，里面有干草和水...\n\n可以在这里恢复体力。',
      '你发现了一处温泉，热气腾腾...\n\n泡一泡会很舒服。'
    ];
    showText('🏕️ 安全地带', restDescs[Math.floor(Math.random() * restDescs.length)], [
      { text: '💤 睡觉恢复', next: 'explore', effect: { hp: 25 } },
      { text: '🧘 打坐修炼', next: 'explore', effect: { power: 5, hp: 10 } },
      { text: '🎯 练习技能', next: 'explore', effect: { power: 8 } },
      { text: '📖 研究秘籍', next: 'explore', effect: { power: 3, karma: 3 } }
    ]);
  },

  boss_entrance: () => {
    document.getElementById('chapter').textContent = '终章：蛇精洞府';
    const ratio = player.power / boss.power;
    let difficulty = '';
    if (ratio >= 1.3) difficulty = '你感觉蛇精已不是你的对手！';
    else if (ratio >= 1.0) difficulty = '这将是一场势均力敌的战斗...';
    else if (ratio >= 0.8) difficulty = '蛇精比你想象的更强！';
    else difficulty = '蛇精的力量远超你的预期...';
    
    showText('🐍 蛇精', 
      `哈哈哈！你终于来了！\n\n我现在的战力是 ${Math.round(boss.power)}，生命是 ${Math.round(boss.hp)}！\n\n${difficulty}\n\n💡 提示：收集更多兄弟可以大幅降低受到的伤害！`, 
      [
        { text: '⚔️ 决战！', next: 'boss_fight' },
        { text: '😰 再准备', next: 'explore', effect: { hp: 10 } }
      ]);
  },

  boss_fight: () => {
    // 战斗公式：基于实力对比
    const powerRatio = player.power / boss.power;
    const skillBonus = 1 + player.skills.length * 0.03;
    
    // 玩家伤害（基于实力对比）- 大幅降低
    let pDmg;
    if (powerRatio >= 1.5) pDmg = Math.floor(player.power * 0.5 * skillBonus);
    else if (powerRatio >= 1.2) pDmg = Math.floor(player.power * 0.4 * skillBonus);
    else if (powerRatio >= 1.0) pDmg = Math.floor(player.power * 0.3 * skillBonus);
    else if (powerRatio >= 0.8) pDmg = Math.floor(player.power * 0.2 * skillBonus);
    else pDmg = Math.floor(player.power * 0.12 * skillBonus);
    
    // Boss伤害 - 大幅提高
    const baseBossDmg = boss.power * 0.6;
    const bossBonus = 1 + Math.floor(turn / 3) * 0.15; // 每3回合Boss变强
    let bDmg = Math.floor(baseBossDmg * bossBonus * (1 - player.skills.length * 0.015));
    
    // 加入随机因素
    const randomFactor = 0.85 + Math.random() * 0.3;
    pDmg = Math.floor(pDmg * randomFactor);
    bDmg = Math.floor(bDmg * (1.8 - randomFactor * 0.6));
    
    applyEffect({ hp: -bDmg, bossHp: -pDmg });
    
    if (boss.hp <= 0) {
      // 多种胜利结局
      const endings = [
        `你终于击败了蛇精！\n造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。\n\n爷爷得救了！`,
        `蛇精倒下了！\n你和兄弟们齐心协力，终于战胜了强敌！\n\n造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。`,
        `战斗结束！蛇精被消灭了！\n你的勇气和智慧让你取得了胜利！`
      ];
      showText('🎉 胜利！', endings[Math.floor(Math.random() * endings.length)], [{ text: '🏆 结局', next: 'ending' }]);
    }
    else if (player.hp <= 0) {
      const failTexts = [
        `你被打败了...蛇精还剩 ${Math.round(boss.hp)} 生命。\n\n看来还需要更多历练...`,
        `蛇精的力量太强了！你倒在了地上...\n\n蛇精还剩 ${Math.round(boss.hp)} 生命。`
      ];
      showText('💀 失败', failTexts[Math.floor(Math.random() * failTexts.length)], [{ text: '🔄 重来', next: 'restart' }]);
    }
    else {
      const progress = Math.floor((1 - boss.hp / boss.maxHp) * 100);
      
      // 根据Boss剩余生命触发不同阶段
      let phaseEffect = '';
      let phaseChoices = [];
      
      if (boss.hp <= boss.maxHp * 0.3 && boss.hp > 0) {
        // Boss 低血量 - 狂暴阶段
        const狂暴 = Math.floor(Math.random() * 15) + 10;
        boss.power = Math.min(boss.maxPower, boss.power + 狂暴);
        phaseEffect = `\n\n🔥 蛇精进入狂暴状态！战力+${狂暴}！\n蛇精释放出黑暗力量，准备同归于尽！`;
        phaseChoices = [
          { text: '⚔️ 继续战斗', next: 'boss_fight' },
          { text: '🌀 使用联合技', next: 'combo_attack', effect: { power: 15 }, data: { pDmg, bDmg } },
          { text: '😰 撤退', next: 'explore', effect: { hp: 15 } }
        ];
      } else if (boss.hp <= boss.maxHp * 0.6 && boss.hp > 0) {
        // Boss 中等血量 - 特殊攻击
        const attacks = [
          '🐍 蛇精释放毒雾！你受到持续伤害！',
          '⚡ 蛇精召唤雷电！地面震动！',
          '🌪️ 蛇精制造幻象！你分不清真假！'
        ];
        phaseEffect = `\n\n${attacks[Math.floor(Math.random() * attacks.length)]}`;
        bDmg += Math.floor(Math.random() * 10) + 5;
        applyEffect({ hp: -Math.floor(Math.random() * 10) - 5 });
        phaseChoices = [
          { text: '⚔️ 继续战斗', next: 'boss_fight' },
          { text: '🛡️ 防御反击', next: 'boss_fight', effect: { hp: 10 } }
        ];
      } else {
        phaseChoices = [
          { text: `继续战斗（${progress}%）`, next: 'boss_fight' },
          { text: '😰 撤退', next: 'explore', effect: { hp: 15 } }
        ];
      }
      
      const fightTexts = [
        `激烈的战斗！造成 ${Math.round(pDmg)} 伤害，受到 ${Math.round(bDmg)} 伤害。\n蛇精还剩 ${Math.round(boss.hp)} 生命！（${progress}%）${phaseEffect}`,
        `你和蛇精打得难解难分！\n造成 ${Math.round(pDmg)} 伤害，受到 ${Math.round(bDmg)} 伤害。\n蛇精还剩 ${Math.round(boss.hp)} 生命！（${progress}%）${phaseEffect}`
      ];
      showText('⚔️ 战斗', fightTexts[Math.floor(Math.random() * fightTexts.length)], phaseChoices);
    }
  },

  combo_attack: () => {
    // 联合技 - 大幅伤害但消耗大量生命
    const comboDmg = Math.floor(player.power * 0.8);
    const comboCost = Math.floor(player.hp * 0.3);
    applyEffect({ hp: -comboCost, bossHp: -comboDmg });
    
    showText('🌀 联合技！', 
      `你使出了七兄弟的联合技能！\n\n造成 ${Math.round(comboDmg)} 伤害！\n但你消耗了 ${Math.round(comboCost)} 生命值...\n\n蛇精还剩 ${Math.round(boss.hp)} 生命！`, 
      [{ text: '⚔️ 继续', next: boss.hp > 0 ? 'boss_fight' : 'ending' }]);
  },

  ending: () => { document.getElementById('chapter').textContent = '🌟 完美结局'; showText('爷爷', '好孩子！你做到了！', [{ text: '🔄 再玩', next: 'restart' }]); },
  restart: () => location.reload()
};

function showEvent(id) { if (events[id]) events[id](); }

function doAction(action) {
  if (!window.isIdle) return;
  window.isIdle = false;
  document.getElementById('actions').style.opacity = '0.5';
  document.getElementById('actions').style.pointerEvents = 'none';

  if (action === 'explore') {
    growBoss(); turn++;
    const r = Math.random();
    if (r < 0.12) { winStreak = 0; showEvent('find_ally'); }
    else if (r < 0.35) { winStreak = 0; showEvent('npc_encounter'); }
    else if (r < 0.55) showEvent('enemy_encounter');
    else if (r < 0.70) { winStreak = 0; showEvent('cave_explore'); }
    else if (r < 0.80) { winStreak = 0; showEvent('trap'); }
    else if (r < 0.90) { winStreak = 0; showEvent('lucky_event'); }
    else { winStreak = 0; showEvent('rest_spot'); }
  }
  else if (action === 'search') {
    growBoss(); turn++;
    if (Math.random() < 0.4) showEvent('find_ally');
    else showText('🔍 寻找', '你仔细搜寻兄弟的踪迹...\n\n但这次没有找到...', [{ text: '继续', next: 'explore' }]);
  }
  else if (action === 'rest') { growBoss(); turn++; applyEffect({ hp: 22 }); showText('💤 休息', '恢复了体力。', [{ text: '继续', next: 'explore' }]); }
  else if (action === 'fight') { 
    const ratio = player.power / boss.power;
    if (ratio >= 1.2) {
      showEvent('boss_entrance');
    } else if (ratio >= 0.9) {
      showText('⚠️ 实力分析', 
        `蛇精战力：${Math.round(boss.power)}\n你的战力：${Math.round(player.power)}\n\n实力接近但还有风险...`, 
        [
          { text: '⚔️ 要挑战', next: 'boss_entrance' },
          { text: '😰 再准备', next: 'explore', effect: { hp: 10 } }
        ]);
    } else {
      showText('💀 实力分析', 
        `蛇精战力：${Math.round(boss.power)}\n你的战力：${Math.round(player.power)}\n\n蛇精比你强太多了！但现在就去挑战是勇敢还是鲁莽？`, 
        [
          { text: '🔥 明知山有虎，偏向虎山行！', next: 'boss_entrance' },
          { text: '😰 还是再准备吧', next: 'explore', effect: { hp: 15 } }
        ]);
    }
  }
}

document.getElementById('charSelect').innerHTML = characters.map(c =>
  `<div class="char-card" style="border-color:${c.color}" onclick="initGame(${c.id})">
    <div style="font-size:24px;">${c.icon}</div>
    <div class="char-name" style="color:${c.color}">${c.name}</div>
    <div class="char-skill">${c.skill}</div>
  </div>`
).join('');
</script>
</body>
</html>
