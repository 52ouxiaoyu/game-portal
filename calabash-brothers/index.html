  document.getElementById('game-screen').style.display = 'block';

}

function addLog(text, color) { logEntries.push({ text, color: color || '#666' }); }

function typeText(text, callback) {
  let idx = 0; document.getElementById('text').textContent = '';
  const iv = setInterval(() => { if (idx < text.length) { document.getElementById('text').textContent += text[idx]; idx++; } else { clearInterval(iv); if (callback) callback(); } }, 18);
}

function showText(speaker, text, choices) {
  document.getElementById('speaker').textContent = speaker;
  document.getElementById('choices').innerHTML = '';
  typeText(text, () => {
    if (choices) {
      const div = document.getElementById('choices');
      choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn'; btn.textContent = c.text;
        btn.onclick = () => { 
          if (c.data) events._tempData = c.data;
          if (c.effect) applyEffect(c.effect); 
          if (c.next) showEvent(c.next); 
          updateUI(); 
        };
        div.appendChild(btn);
      });
    }
  });
}

function applyEffect(e) {
  if (e.hp) player.hp = Math.max(1, Math.min(player.maxHp, player.hp + e.hp));
  if (e.power) player.power = Math.max(0, Math.min(player.maxPower, player.power + e.power));
  if (e.brave) player.brave = Math.max(0, Math.min(100, player.brave + e.brave));
  if (e.karma) player.karma += e.karma;
  if (e.skill && !player.skills.includes(e.skill)) player.skills.push(e.skill);
  if (e.bossHp) boss.hp = Math.max(0, boss.hp + e.bossHp);
  if (e.bossPower) boss.power = Math.max(0, Math.min(boss.maxPower, boss.power + e.bossPower));
}

function growBoss() {
  // Boss基础增长（随回合数增加）
  const baseGain = Math.floor(boss.power * 0.08 + turn * 0.5);
  boss.power = Math.min(boss.maxPower, boss.power + baseGain);
  boss.hp = Math.min(boss.maxHp, boss.hp + 10);
  addLog(`🐍 蛇精修炼中...战力+${baseGain}`, '#ff6b6b');
  
  // 蛇精偶遇事件（30%概率）
  const bossEvent = Math.random();
  if (bossEvent < 0.08) {
    // 💥 蛇精遇到强敌，两败俱伤
    const damage = Math.floor(Math.random() * 30) + 20;
    boss.hp = Math.max(30, boss.hp - damage);
    boss.power = Math.min(boss.maxPower, boss.power + 15);
    addLog(`💥 蛇精与神秘强者激战！生命-${damage}，但战力+15！`, '#ff8800');
  } else if (bossEvent < 0.15) {
    // 🎁 蛇精获得神秘法器
    const artifacts = ['千年蛇丹', '妖王内丹', '毒蛇胆', '蛇皮护甲', '魔蛇之眼'];
    const artifact = artifacts[Math.floor(Math.random() * artifacts.length)];
    const hpGain = Math.floor(Math.random() * 25) + 15;
    const powerGain = Math.floor(Math.random() * 10) + 5;
    boss.hp = Math.min(boss.maxHp, boss.hp + hpGain);
    boss.power = Math.min(boss.maxPower, boss.power + powerGain);
    addLog(`🎁 蛇精找到了${artifact}！生命+${hpGain}，战力+${powerGain}！`, '#9b59b6');
  } else if (bossEvent < 0.20) {
    // 😈 蛇精蛊惑了无辜
    const victims = ['村民', '商人', '书生', '农夫', '猎人'];
    const victim = victims[Math.floor(Math.random() * victims.length)];
    const powerGain = Math.floor(Math.random() * 8) + 3;
    boss.power = Math.min(boss.maxPower, boss.power + powerGain);
    addLog(`😈 蛇精蛊惑了${victim}，吸取精气！战力+${powerGain}`, '#ff8800');
  } else if (bossEvent < 0.25) {
    // 🐍 蛇精遇到手下
    const minions = ['小妖精', '蜘蛛精', '蝙蝠怪', '蛤蟆精', '蛇妖'];
    const minion = minions[Math.floor(Math.random() * minions.length)];
    const gainBonus = Math.floor(Math.random() * 6) + 2;
    boss.power = Math.min(boss.maxPower, boss.power + gainBonus);
    addLog(`🐍 蛇精收服了${minion}！战力+${gainBonus}`, '#ff6b6b');
  } else if (bossEvent < 0.28) {
    // 😵 蛇精走火入魔
    const moodLoss = Math.floor(Math.random() * 10) + 5;
    boss.power = Math.max(10, boss.power - moodLoss);
    addLog(`😵 蛇精修炼走火入魔！战力-${moodLoss}`, '#4ecdc4');
  } else if (bossEvent < 0.32) {
    // 💪 蛇精怒气爆发
    const怒气Gain = Math.floor(Math.random() * 12) + 8;
    boss.power = Math.min(boss.maxPower, boss.power + 怒气Gain);
    boss.brave = Math.min(100, boss.brave + 10);
    addLog(`💪 蛇精怒气爆发！战力+${怒气Gain}，气势+10！`, '#ff4444');
  }
}

const events = {
  _tempData: {},
  intro: () => showText('旁白', `你选择了${player.char.name}！\n\n蛇精抓走了爷爷，你必须提升实力去救他。\n\n⚠️ 蛇精每回合都在变强！要在实力足够时尽快挑战！`, [{ text: '🔍 开始冒险', next: 'explore' }]),

  explore: () => {
    growBoss(); turn++;
    // 非战斗事件重置连胜
    const r = Math.random();
    if (r < 0.12) { winStreak = 0; showEvent('find_ally'); }
    else if (r < 0.35) { winStreak = 0; showEvent('npc_encounter'); }
    else if (r < 0.55) showEvent('enemy_encounter');
    else if (r < 0.70) { winStreak = 0; showEvent('cave_explore'); }
    else if (r < 0.80) { winStreak = 0; showEvent('trap'); }
    else if (r < 0.90) { winStreak = 0; showEvent('lucky_event'); }
    else { winStreak = 0; showEvent('rest_spot'); }
  },

  find_ally: () => {
    const missing = allSkills.filter(s => !player.skills.includes(s));
    if (missing.length === 0) { 
      showText('旁白', `你已集齐所有七兄弟！\n\n已获得的技能：${player.skills.join('、')}\n\n现在可以去挑战蛇精了！`, [{ text: '继续', next: 'explore' }]); 
      return; 
    }
    const skill = missing[Math.floor(Math.random() * missing.length)];
    const brother = characters.find(c => c.skill === skill);
    const foundCount = player.skills.length;
    
    // 随机决定是友方还是被蛊惑的兄弟
    const isCorrupted = Math.random() < 0.3 && foundCount >= 2;
    
    if (isCorrupted) {
      showText(`😈 ${brother.name}（被蛊惑）`, 
        `${brother.name}被蛇精的妖术蛊惑了！\n\n他眼神空洞，似乎认不出你...\n\n「你是谁？蛇精才是我的主人！」`, 
        [
          { text: '🗣️ 呼唤他的名字', next: 'convince_brother', effect: { brave: 5 }, data: { brother, skill } },
          { text: '⚔️ 用武力唤醒', next: 'force_brother', effect: { brave: 10 }, data: { brother, skill } },
          { text: '😢 诉说亲情', next: 'emotion_brother', effect: { karma: 10 }, data: { brother, skill } }
        ]);
    } else {
      showText(`🌟 ${brother.name}`, 
        `终于找到你了！${brother.name}！\n\n「${brother.motto}」\n\n我的技能是「${brother.skill}」！\n\n兄弟，我们一起救爷爷！`, 
        [
          { text: `🤝 携手同行（获得 ${brother.skill}）`, next: 'explore', effect: { skill, power: 8 + foundCount * 2 } },
          { text: '💬 聊聊天', next: 'talk_brother', data: { brother } }
        ]);
    }
  },

  convince_brother: () => {
    const brother = events._tempData?.brother;
    const skill = events._tempData?.skill;
    const success = player.brave >= 40 || player.karma >= 10;
    
    if (success) {
      showText(`🌟 ${brother.name}`, 
        `你的呼唤唤醒了${brother.name}！\n\n「哥哥...我想起来了...蛇精骗了我...」\n\n${brother.name}加入队伍！`, 
        [{ text: `获得 ${skill}！`, next: 'explore', effect: { skill, power: 12 } }]);
    } else {
      showText(`😈 ${brother.name}`, 
        `${brother.name}摇了摇头...\n\n「不...蛇精说得对...你们都是坏人...」\n\n你的勇气或善恶值不够，需要更多历练。`, 
        [{ text: '继续', next: 'explore', effect: { hp: -10 } }]);
    }
  },

  force_brother: () => {
    const brother = events._tempData?.brother;
    const skill = events._tempData?.skill;
    const success = player.power >= 25;
    
    if (success) {
      showText(`⚔️ 战斗`, 
        `你与${brother.name}展开激战！\n\n经过一番搏斗，你用强大的力量震醒了他！\n\n「我...我怎么了...」`, 
        [{ text: `${brother.name}恢复清醒！`, next: 'explore', effect: { skill, power: 10, hp: -15 } }]);
    } else {
      showText(`😤 失败`, 
        `${brother.name}的力量太强了！\n\n你被击退了...`, 
        [{ text: '撤退', next: 'explore', effect: { hp: -20 } }]);
    }
  },

  emotion_brother: () => {
    const brother = events._tempData?.brother;
    const skill = events._tempData?.skill;
    const success = player.karma >= 5;
    
    if (success) {
      showText(`😢 ${brother.name}`, 
        `你含泪讲述了爷爷被抓的故事...\n\n${brother.name}的眼眶湿润了...\n\n「爷爷...我想起来了...蛇精是坏人！」`, 
        [{ text: `${brother.name}清醒了！`, next: 'explore', effect: { skill, power: 8, karma: 5 } }]);
    } else {
      showText(`😠 ${brother.name}`, 
        `${brother.name}不为所动...\n\n「废话少说！」`, 
        [{ text: '无奈离开', next: 'explore' }]);
    }
  },

  talk_brother: () => {
    const brother = events._tempData?.brother;
    const dialogues = [
      `${brother.name}说：「${brother.desc}」`,
      `${brother.name}说：「我的性格是${brother.personality}。」`,
      `${brother.name}说：「${brother.motto}」`,
      `${brother.name}说：「我们七兄弟各有本领，团结起来力量更大！」`
    ];
    showText(`💬 ${brother.name}`, 
      dialogues[Math.floor(Math.random() * dialogues.length)], 
      [{ text: '🤝 加入队伍', next: 'explore', effect: { skill: brother.skill, power: 6 } }]);
  },

  npc_encounter: () => {
    const npc = npcs[Math.floor(Math.random() * npcs.length)];
    if (npc.dialogues && npc.dialogues.length > 0) {
      const choices = npc.dialogues.map(d => ({
        text: d.text,
        next: 'npc_dialogue_result',
        effect: d.effect,
        data: { npc, dialogue: d }
      }));
      showText(npc.name, npc.desc, choices);
    } else {
      const good = Math.random() > 0.4;
      if (good) {
        showText(npc.name, npc.desc, [{ 
          text: '🤝 接受', 
          next: 'npc_result', 
          effect: npc.effectGood,
          data: { npc, isGood: true }
        }, { 
          text: '👋 离开', 
          next: 'npc_leave',
          data: { npc }
        }]);
      } else {
        showText(npc.name, npc.desc + '\n\n⚠️ 感觉不太对劲...', [{ 
          text: '🤝 接受', 
          next: 'npc_result', 
          effect: npc.effectBad,
          data: { npc, isGood: false }
        }, { 
          text: '🚫 拒绝', 
          next: 'npc_reject',
          data: { npc }
        }]);
      }
    }
  },

  npc_dialogue_result: () => {
    const { npc, dialogue } = events._tempData;
    showText(`🎭 ${npc.name}`, dialogue.result, [{ text: '继续探索', next: 'explore' }]);
  },

  npc_result: () => {
    const { npc, isGood } = events._tempData;
    const resultText = isGood ? (npc.result || '你做出了选择...') : (npc.result || '结果出乎意料...');
    const emoji = isGood ? '✅' : '❌';
    showText(`${emoji} ${npc.name}`, resultText, [{ text: '继续探索', next: 'explore' }]);
  },

  npc_leave: () => {
    const { npc } = events._tempData;
    const leaveTexts = [
      `${npc.name}看着你离去的背影，摇了摇头...`,
      `你礼貌地告别了${npc.name}，继续你的旅程。`,
      `${npc.name}微微点头，目送你离开。`
    ];
    showText('👋 离开', leaveTexts[Math.floor(Math.random() * leaveTexts.length)], [{ text: '继续', next: 'explore' }]);
  },

  npc_reject: () => {
    const { npc } = events._tempData;
    const rejectTexts = [
      `你警惕地拒绝了${npc.name}。${npc.name}看起来有些失望...`,
      `你保持距离，${npc.name}无奈地离开了。`,
      `你的警惕心救了你一命！${npc.name}其实是蛇精的眼线。`
    ];
    showText('🚫 拒绝', rejectTexts[Math.floor(Math.random() * rejectTexts.length)], [{ text: '继续', next: 'explore', effect: { brave: 5 } }]);
  },

  enemy_encounter: () => {
    const e = enemies[Math.floor(Math.random() * enemies.length)];
    const powerRatio = player.power / e.power;
    
    // 根据实力对比显示不同信息
    let difficulty = '';
    if (powerRatio >= 1.5) difficulty = '🟢 轻松碾压';
    else if (powerRatio >= 1.1) difficulty = '🟡 有优势';
    else if (powerRatio >= 0.9) difficulty = '🟠 势均力敌';
    else if (powerRatio >= 0.7) difficulty = '🔴 有风险';
    else difficulty = '💀 危险！';
    
    const strategies = [
      { text: `⚔️ 正面迎战`, effect: { hp: -e.power * 0.3, power: 3, brave: 5 }, successRate: Math.min(0.95, powerRatio * 0.8) },
      { text: `🎯 偷袭弱点`, effect: { hp: -e.power * 0.2, power: 5 }, condition: player.skills.includes('隐身'), successRate: 0.9 },
      { text: `🔥 火焰攻击`, effect: { hp: -e.power * 0.15, power: 4 }, condition: player.skills.includes('喷火'), successRate: 0.85 },
      { text: `💪 蛮力碾压`, effect: { hp: -e.power * 0.1, power: 6 }, condition: player.skills.includes('力大无穷'), successRate: Math.min(0.95, powerRatio * 1.2) },
      { text: `👀 侦查敌情`, effect: { power: 2 }, condition: player.skills.includes('千里眼'), successRate: 1 },
      { text: `🛡️ 铜墙铁壁`, effect: { hp: -e.power * 0.05, power: 4 }, condition: player.skills.includes('铜头铁臂'), successRate: 0.95 },
      { text: `💧 水幕护体`, effect: { hp: -e.power * 0.08, power: 3, hp: 5 }, condition: player.skills.includes('吸水'), successRate: 0.9, desc: '用水流抵挡伤害' },
      { text: `🏺 宝葫芦收妖`, effect: { hp: -e.power * 0.25, power: 8 }, condition: player.skills.includes('宝葫芦'), successRate: 0.92, desc: '用宝葫芦直接收服敌人' },
      { text: `💨 战术撤退`, effect: { hp: -2, brave: -2 }, successRate: 1 }
    ].filter(s => !s.condition || s.condition);
    
    showText(e.name, `⚔️ ${e.desc}！\n\n${difficulty}\n敌人战力：${e.power} | 敌人生命：${e.hp}\n你的战力：${player.power}`, strategies.map(s => ({
      text: s.text,
      next: 'combat_result',
      effect: s.effect,
      data: { enemy: e, successRate: s.successRate }
    })));
  },

  combat_result: () => {
    const { enemy, successRate } = events._tempData;
    const success = Math.random() < successRate;
    
    if (success) {
      winStreak++;
      let streakBonus = '';
      let bonusEffect = {};
      
      if (winStreak >= 5) {
        streakBonus = `\n\n🔥 连胜 ${winStreak} 场！触发"战神附体"效果！`;
        bonusEffect = { power: 5, hp: 10, brave: 5 };
      } else if (winStreak >= 3) {
        streakBonus = `\n\n⚡ 连胜 ${winStreak} 场！气势如虹！`;
        bonusEffect = { power: 3, brave: 3 };
      } else if (winStreak >= 2) {
        streakBonus = `\n\n✨ 连胜 ${winStreak} 场！士气大振！`;
        bonusEffect = { power: 2 };
      }
      
      const winTexts = [
        `你英勇地击退了${enemy.name}！`,
        `战斗胜利！${enemy.name}落荒而逃！`,
        `经过激战，你取得了胜利！`,
        `你用实力证明了自己！`
      ];
      
      showText('✅ 胜利', winTexts[Math.floor(Math.random() * winTexts.length)] + streakBonus, 
        [{ text: '继续探索', next: 'explore', effect: bonusEffect }]);
    } else {
      winStreak = 0;
      const failTexts = [
        `${enemy.name}的实力超出了你的预期！你被打败了...`,
        `战斗失败！${enemy.name}太强了...`,
        `你低估了${enemy.name}的实力，被打得落花流水...`
      ];
      const damage = Math.floor(enemy.power * 0.5);
      showText('❌ 失败', failTexts[Math.floor(Math.random() * failTexts.length)] + `\n\n受到 ${damage} 点伤害！`, 
        [{ text: '狼狈逃走', next: 'explore', effect: { hp: -damage, brave: -5 } }]);
    }
  },

  combat_result: () => {
    winStreak++;
    let streakBonus = '';
    let bonusEffect = {};
    
    if (winStreak >= 5) {
      streakBonus = `\n\n🔥 连胜 ${winStreak} 场！触发"战神附体"效果！`;
      bonusEffect = { power: 5, hp: 10, brave: 5 };
    } else if (winStreak >= 3) {
      streakBonus = `\n\n⚡ 连胜 ${winStreak} 场！气势如虹！`;
      bonusEffect = { power: 3, brave: 3 };
    } else if (winStreak >= 2) {
      streakBonus = `\n\n✨ 连胜 ${winStreak} 场！士气大振！`;
      bonusEffect = { power: 2 };
    }
    
    const msgs = [
      '你英勇地击退了敌人！',
      '战斗胜利！你变得更强了！',
      '敌人落荒而逃！',
      '经过激战，你取得了胜利！',
      '你用实力证明了自己！'
    ];
    
    showText('✅ 胜利', msgs[Math.floor(Math.random() * msgs.length)] + streakBonus, 
      [{ text: '继续探索', next: 'explore', effect: bonusEffect }]);
  },

  cave_explore: () => {
    const r = Math.random();
    if (r < 0.4) {
      const items = [
        { name: '💰 古老宝箱', desc: '一个布满灰尘的宝箱，看起来很久没人打开过了', effect: { power: 5, hp: 10 } },
        { name: '📜 神秘书籍', desc: '一本泛黄的古籍，上面记载着失传的武学', effect: { power: 8 } },
        { name: '💊 千年仙丹', desc: '散发着金色光芒的丹药', effect: { hp: 25 } },
        { name: '🔮 魔法水晶', desc: '蕴含神秘力量的水晶', effect: { power: 6, hp: 8 } },
        { name: '⚔️ 古代兵器', desc: '一把锋利的古剑，寒光闪闪', effect: { power: 10 } },
        { name: '🛡️ 神秘护符', desc: '一个古老的护符，散发着温暖的光芒', effect: { hp: 30 } }
      ];
      const item = items[Math.floor(Math.random() * items.length)];
      showText(item.name, `你走进了一个神秘的洞穴...\n\n${item.desc}\n\n你决定...`, [
        { text: '🔍 仔细检查', next: 'explore', effect: item.effect },
        { text: '👀 保持警惕', next: 'explore', effect: { hp: 5, brave: 3 } }
      ]);
    } else if (r < 0.7) {
      const dangers = [
        { name: '💣 古老炸弹', desc: '你踩到了一个生锈的陷阱！轰隆一声！', effect: { hp: -20 } },
        { name: '☠️ 毒气弥漫', desc: '洞穴里弥漫着紫色的毒雾，你吸入了一些...', effect: { hp: -15, power: -2 } },
        { name: '🪤 精密陷阱', desc: '一个精心设计的机关突然触发！', effect: { hp: -18 } },
        { name: '👻 远古亡灵', desc: '洞穴深处传来诡异的声音...', effect: { hp: -12, brave: -8 } },
        { name: '💀 骷髅守卫', desc: '一个骷髅战士从阴影中冲出！', effect: { hp: -25 } }
      ];
      const d = dangers[Math.floor(Math.random() * dangers.length)];
      showText(d.name, `你走进了一个阴暗的洞穴...\n\n${d.desc}\n\n你如何应对？`, [
        { text: '😤 硬抗', next: 'explore', effect: d.effect },
        { text: '🏃 快速躲避', next: 'explore', effect: { hp: Math.floor(d.effect.hp * 0.5), brave: 2 } },
        { text: '🧠 用智慧化解', next: 'explore', effect: { hp: Math.floor(d.effect.hp * 0.3), power: 2 } }
      ]);
    } else {
      // 发现隐藏区域
      const discoveries = [
        { name: '🏛️ 远古遗迹', desc: '你发现了一个远古文明的遗迹，墙壁上刻满了神秘的符文...', effect: { power: 8, karma: 5 } },
        { name: '🌿 神秘花园', desc: '洞穴深处竟然有一个生机勃勃的花园，花朵散发着治愈的气息...', effect: { hp: 35, karma: 3 } },
        { name: '📖 武学秘境', desc: '你发现了一个武学秘境，墙壁上记载着各种武学招式...', effect: { power: 12 } }
      ];
      const disc = discoveries[Math.floor(Math.random() * discoveries.length)];
      showText(disc.name, disc.desc, [
        { text: '🌟 探索', next: 'explore', effect: disc.effect },
        { text: '📸 记录下来', next: 'explore', effect: { power: 3, karma: 2 } }
      ]);
    }
  },

  trap: () => {
    const traps = [
      { name: '🍌 香蕉皮陷阱', desc: '一个巨大的香蕉皮！你一脚踩上去滑飞了！', effect: { hp: -10 }, humor: '你在空中转了三圈才落地...' },
      { name: '🕳️ 弹射陷阱', desc: '地面突然弹开，你被弹到了空中！', effect: { hp: -15 }, humor: '你看到了远处的风景，然后重重落地...' },
      { name: '🌪️ 毒雾陷阱', desc: '一团紫色的毒雾突然喷出！', effect: { hp: -8, power: -2 }, humor: '你感觉自己变轻了...是力量在流失...' },
      { name: '😱 幻术陷阱', desc: '你眼前出现了可怕的幻象！', effect: { brave: -10 }, humor: '你看到了...自己变成了一只鸡？！' },
      { name: '🪤 缠绕陷阱', desc: '无数藤蔓从地下冒出，缠住了你！', effect: { hp: -5, brave: -5 }, humor: '你像一个粽子一样被包了起来...' },
      { name: '⚡ 雷电陷阱', desc: '一道闪电劈向你！', effect: { hp: -12 }, humor: '你的头发竖起来了，像一个刺猬...' },
      { name: '🔥 火焰陷阱', desc: '地面突然喷出火焰！', effect: { hp: -18 }, humor: '你闻到了...烤肉的味道？是你自己！' },
      { name: '❄️ 冰冻陷阱', desc: '你被瞬间冻成了冰块！', effect: { hp: -10, power: -3 }, humor: '你变成了一座冰雕，过了好久才融化...' }
    ];
    const t = traps[Math.floor(Math.random() * traps.length)];
    showText(t.name, `${t.desc}\n\n${t.humor}`, [
      { text: '😤 爬起来继续', next: 'explore', effect: t.effect },
      { text: '🧘 冥想恢复', next: 'explore', effect: { hp: Math.floor(t.effect.hp * 0.5), brave: 3 } }
    ]);
  },

  lucky_event: () => {
    const r = Math.random();
    // 20%概率触发特殊大事件
    if (r < 0.08) {
      // 💥 奇遇：力量暴涨
      const bonus = Math.floor(Math.random() * 20) + 15;
      player.power = Math.min(player.maxPower, player.power + bonus);
      showText('💥 奇遇！', `你误入了一个神秘洞穴，发现了一颗千年内丹！\n\n战力瞬间暴涨 +${bonus}！\n\n「这股力量...太强了！」`, [{ text: '🎉 太棒了', next: 'explore', effect: {} }]);
    } else if (r < 0.15) {
      // 💀 灾难：身受重伤
      const damage = Math.floor(player.hp * 0.5);
      player.hp = Math.max(1, player.hp - damage);
      showText('💀 灾难！', `你踩到了一个古老的诅咒陷阱！\n\n生命值骤降 -${damage}！\n\n「不...这怎么可能...」`, [{ text: '😤 坚持住', next: 'explore', effect: { brave: 10 } }]);
    } else if (r < 0.22) {
      // 🎁 获得神秘法器
      const artifacts = [
        { name: '⚔️ 上古神剑', power: 25, desc: '一把散发寒光的神剑！战力+25！' },
        { name: '🛡️ 金刚护盾', hp: 50, desc: '一个金色护盾！生命+50！' },
        { name: '🔮 魔法水晶', power: 15, hp: 20, desc: '一颗神秘水晶！战力+15，生命+20！' },
        { name: '💊 九转金丹', hp: 80, desc: '一颗金丹！生命直接回满！' },
        { name: '📖 天书秘籍', power: 30, desc: '一本古老秘籍！战力+30！' }
      ];
      const artifact = artifacts[Math.floor(Math.random() * artifacts.length)];
      showText(artifact.name, `你发现了一个神秘宝箱！\n\n打开后里面是...${artifact.name}！\n\n${artifact.desc}`, 
        [{ text: '🎉 收下', next: 'explore', effect: { power: artifact.power || 0, hp: artifact.hp || 0 } }]);
    } else if (r < 0.28) {
      // 🎭 遇到骗子
      showText('🎭 神秘人', '一个神秘人出现，声称要给你力量...\n\n但你感觉不太对劲...', [
        { text: '🤝 相信他', next: 'explore', effect: Math.random() < 0.5 ? { power: 12 } : { hp: -30, power: -10 } },
        { text: '🚫 警惕拒绝', next: 'explore', effect: { brave: 8 } }
      ]);
    } else if (r < 0.35) {
      // ⚡ 意外触发机关
      showText('⚡ 意外！', '你意外触发了一个古老机关！\n\n一道光芒闪过...', [
        { text: '✨ 接受洗礼', next: 'explore', effect: { power: Math.floor(Math.random() * 10) + 5, hp: Math.floor(Math.random() * 20) + 10 } },
        { text: '🏃 赶紧跑', next: 'explore', effect: { brave: 5 } }
      ]);
    } else {
      // 普通幸运事件
      const luckies = [
        { name: '🍀 幸运草', effect: { hp: 12, power: 3 } },
        { name: '💰 宝箱', effect: { power: 6, hp: 8 } },
        { name: '🌟 灵泉', effect: { hp: 20 } },
        { name: '📜 秘籍', effect: { power: 8 } },
        { name: '🔮 法杖', effect: { power: 5, hp: 10 } },
        { name: '💎 宝石', effect: { power: 7 } },
        { name: '🎁 礼物', effect: { hp: 15, power: 4 } }
      ];
      const l = luckies[Math.floor(Math.random() * luckies.length)];
      showText(l.name, '你发现了好东西！', [{ text: '🎉 太好了', next: 'explore', effect: l.effect }]);
    }
  },

  rest_spot: () => {
    const restDescs = [
      '你找到了一个隐蔽的山洞，洞口被藤蔓遮挡着...\n\n这里很安全，可以好好休息一下。',
      '你发现了一片宁静的竹林，微风轻轻吹过...\n\n是个休息的好地方。',
      '你找到了一个废弃的猎人小屋，里面有干草和水...\n\n可以在这里恢复体力。',
      '你发现了一处温泉，热气腾腾...\n\n泡一泡会很舒服。'
    ];
    showText('🏕️ 安全地带', restDescs[Math.floor(Math.random() * restDescs.length)], [
      { text: '💤 睡觉恢复', next: 'explore', effect: { hp: 25 } },
      { text: '🧘 打坐修炼', next: 'explore', effect: { power: 5, hp: 10 } },
      { text: '🎯 练习技能', next: 'explore', effect: { power: 8 } },
      { text: '📖 研究秘籍', next: 'explore', effect: { power: 3, karma: 3 } }
    ]);
  },

  boss_entrance: () => {
    document.getElementById('chapter').textContent = '终章：蛇精洞府';
    const ratio = player.power / boss.power;
    let difficulty = '';
    if (ratio >= 1.3) difficulty = '你感觉蛇精已不是你的对手！';
    else if (ratio >= 1.0) difficulty = '这将是一场势均力敌的战斗...';
    else if (ratio >= 0.8) difficulty = '蛇精比你想象的更强！';
    else difficulty = '蛇精的力量远超你的预期...';
    
    showText('🐍 蛇精', 
      `哈哈哈！你终于来了！\n\n我现在的战力是 ${boss.power}，生命是 ${boss.hp}！\n\n${difficulty}\n\n💡 提示：收集更多兄弟可以大幅降低受到的伤害！`, 
      [
        { text: '⚔️ 决战！', next: 'boss_fight' },
        { text: '😰 再准备', next: 'explore', effect: { hp: 10 } }
      ]);
  },

  boss_fight: () => {
    // 战斗公式：基于实力对比
    const powerRatio = player.power / boss.power;
    const skillBonus = 1 + player.skills.length * 0.03;
    
    // 玩家伤害（基于实力对比）- 大幅降低
    let pDmg;
    if (powerRatio >= 1.5) pDmg = Math.floor(player.power * 0.5 * skillBonus);
    else if (powerRatio >= 1.2) pDmg = Math.floor(player.power * 0.4 * skillBonus);
    else if (powerRatio >= 1.0) pDmg = Math.floor(player.power * 0.3 * skillBonus);
    else if (powerRatio >= 0.8) pDmg = Math.floor(player.power * 0.2 * skillBonus);
    else pDmg = Math.floor(player.power * 0.12 * skillBonus);
    
    // Boss伤害 - 大幅提高
    const baseBossDmg = boss.power * 0.6;
    const bossBonus = 1 + Math.floor(turn / 3) * 0.15; // 每3回合Boss变强
    let bDmg = Math.floor(baseBossDmg * bossBonus * (1 - player.skills.length * 0.015));
    
    // 加入随机因素
    const randomFactor = 0.85 + Math.random() * 0.3;
    pDmg = Math.floor(pDmg * randomFactor);
    bDmg = Math.floor(bDmg * (1.8 - randomFactor * 0.6));
    
    applyEffect({ hp: -bDmg, bossHp: -pDmg });
    
    if (boss.hp <= 0) {
      // 多种胜利结局
      const endings = [
        `你终于击败了蛇精！\n造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。\n\n爷爷得救了！`,
        `蛇精倒下了！\n你和兄弟们齐心协力，终于战胜了强敌！\n\n造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。`,
        `战斗结束！蛇精被消灭了！\n你的勇气和智慧让你取得了胜利！`
      ];
      showText('🎉 胜利！', endings[Math.floor(Math.random() * endings.length)], [{ text: '🏆 结局', next: 'ending' }]);
    }
    else if (player.hp <= 0) {
      const failTexts = [
        `你被打败了...蛇精还剩 ${boss.hp} 生命。\n\n看来还需要更多历练...`,
        `蛇精的力量太强了！你倒在了地上...\n\n蛇精还剩 ${boss.hp} 生命。`
      ];
      showText('💀 失败', failTexts[Math.floor(Math.random() * failTexts.length)], [{ text: '🔄 重来', next: 'restart' }]);
    }
    else {
      const progress = Math.floor((1 - boss.hp / boss.maxHp) * 100);
      
      // 根据Boss剩余生命触发不同阶段
      let phaseEffect = '';
      let phaseChoices = [];
      
      if (boss.hp <= boss.maxHp * 0.3 && boss.hp > 0) {
        // Boss 低血量 - 狂暴阶段
        const狂暴 = Math.floor(Math.random() * 15) + 10;
        boss.power = Math.min(boss.maxPower, boss.power + 狂暴);
        phaseEffect = `\n\n🔥 蛇精进入狂暴状态！战力+${狂暴}！\n蛇精释放出黑暗力量，准备同归于尽！`;
        phaseChoices = [
          { text: '⚔️ 继续战斗', next: 'boss_fight' },
          { text: '🌀 使用联合技', next: 'combo_attack', effect: { power: 15 }, data: { pDmg, bDmg } },
          { text: '😰 撤退', next: 'explore', effect: { hp: 15 } }
        ];
      } else if (boss.hp <= boss.maxHp * 0.6 && boss.hp > 0) {
        // Boss 中等血量 - 特殊攻击
        const attacks = [
          '🐍 蛇精释放毒雾！你受到持续伤害！',
          '⚡ 蛇精召唤雷电！地面震动！',
          '🌪️ 蛇精制造幻象！你分不清真假！'
        ];
        phaseEffect = `\n\n${attacks[Math.floor(Math.random() * attacks.length)]}`;
        bDmg += Math.floor(Math.random() * 10) + 5;
        applyEffect({ hp: -Math.floor(Math.random() * 10) - 5 });
        phaseChoices = [
          { text: '⚔️ 继续战斗', next: 'boss_fight' },
          { text: '🛡️ 防御反击', next: 'boss_fight', effect: { hp: 10 } }
        ];
      } else {
        phaseChoices = [
          { text: `继续战斗（${progress}%）`, next: 'boss_fight' },
          { text: '😰 撤退', next: 'explore', effect: { hp: 15 } }
        ];
      }
      
      const fightTexts = [
        `激烈的战斗！造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。\n蛇精还剩 ${boss.hp} 生命！（${progress}%）${phaseEffect}`,
        `你和蛇精打得难解难分！\n造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。\n蛇精还剩 ${boss.hp} 生命！（${progress}%）${phaseEffect}`
      ];
      showText('⚔️ 战斗', fightTexts[Math.floor(Math.random() * fightTexts.length)], phaseChoices);
    }
  },

  combo_attack: () => {
    // 联合技 - 大幅伤害但消耗大量生命
    const comboDmg = Math.floor(player.power * 0.8);
    const comboCost = Math.floor(player.hp * 0.3);
    applyEffect({ hp: -comboCost, bossHp: -comboDmg });
    
    showText('🌀 联合技！', 
      `你使出了七兄弟的联合技能！\n\n造成 ${comboDmg} 伤害！\n但你消耗了 ${comboCost} 生命值...\n\n蛇精还剩 ${boss.hp} 生命！`, 
      [{ text: '⚔️ 继续', next: boss.hp > 0 ? 'boss_fight' : 'ending' }]);
  },

  ending: () => { document.getElementById('chapter').textContent = '🌟 完美结局'; showText('爷爷', '好孩子！你做到了！', [{ text: '🔄 再玩', next: 'restart' }]); },
  restart: () => location.reload()
};

function showEvent(id) { if (events[id]) events[id](); }

function doAction(action) {
  if (action === 'explore') showEvent('explore');
  else if (action === 'search') {
    growBoss(); turn++;
    if (Math.random() < 0.4) showEvent('find_ally');
    else showText('🔍 寻找', '你仔细搜寻兄弟的踪迹...\n\n但这次没有找到...', [{ text: '继续', next: 'explore' }]);
  }
  else if (action === 'rest') { growBoss(); turn++; applyEffect({ hp: 22 }); showText('💤 休息', '恢复了体力。', [{ text: '继续', next: 'explore' }]); }
  else if (action === 'fight') { 
    const ratio = player.power / boss.power;
    if (ratio >= 1.2) {
      showEvent('boss_entrance');
    } else if (ratio >= 0.9) {
      showText('⚠️ 实力分析', 
        `蛇精战力：${boss.power}\n你的战力：${player.power}\n\n实力接近但还有风险...`, 
        [
          { text: '⚔️ 要挑战', next: 'boss_entrance' },
          { text: '😰 再准备', next: 'explore', effect: { hp: 10 } }
        ]);
    } else {
      showText('💀 实力分析', 
        `蛇精战力：${boss.power}\n你的战力：${player.power}\n\n蛇精比你强太多了！但现在就去挑战是勇敢还是鲁莽？`, 
        [
          { text: '🔥 明知山有虎，偏向虎山行！', next: 'boss_entrance' },
          { text: '😰 还是再准备吧', next: 'explore', effect: { hp: 15 } }
        ]);
    }
  }
}

document.getElementById('charSelect').innerHTML = characters.map(c =>
  `<div class="char-card" style="border-color:${c.color}" onclick="initGame(${c.id})">
    <div style="font-size:24px;">${c.icon}</div>
    <div class="char-name" style="color:${c.color}">${c.name}</div>
    <div class="char-skill">${c.skill}</div>
  </div>`
).join('');
</script>
</body>
</html>
