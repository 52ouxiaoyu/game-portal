<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #fafafa;
            color: #1d1d1f;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 100px 24px 80px;
        }

        header {
            text-align: center;
            margin-bottom: 72px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 48px;
        }

        .stat {
            text-align: center;
            padding: 16px 24px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8e8ed;
            min-width: 100px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 11px;
            color: #86868b;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .game-card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e8e8ed;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border-color: transparent;
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .game-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .game-title {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.2px;
        }

        .game-stats {
            display: flex;
            gap: 12px;
            margin-top: 3px;
            font-size: 12px;
            color: #86868b;
        }

        .game-desc {
            font-size: 13px;
            color: #1d1d1f;
            line-height: 1.5;
            margin-bottom: 14px;
            opacity: 0.8;
        }

        .game-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .tag {
            padding: 3px 8px;
            background: #f5f5f7;
            border-radius: 4px;
            font-size: 11px;
            color: #1d1d1f;
            font-weight: 500;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 11px 20px;
            background: #1d1d1f;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
        }

        .play-btn:hover {
            background: #424245;
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        .play-btn svg {
            width: 14px;
            height: 14px;
            transition: transform 0.2s ease;
        }

        .play-btn:hover svg {
            transform: translateX(2px);
        }

        .footer {
            text-align: center;
            padding: 48px 24px 32px;
            color: #86868b;
            font-size: 11px;
            letter-spacing: 0.3px;
        }

        .coffee-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            background: #FFDD00;
            color: #000000;
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(255, 221, 0, 0.4);
        }

        .coffee-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 221, 0, 0.6);
        }

        .coffee-btn:active {
            transform: translateY(0);
        }
        button.coffee-btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        /* Donate Modal */
        .donate-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .donate-content {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            position: relative;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .donate-close {
            position: absolute;
            top: 16px; right: 16px;
            cursor: pointer;
            font-size: 28px;
            color: #aaa;
            line-height: 1;
        }
        .donate-close:hover { color: #333; }
        .donate-qr {
            width: 160px; height: 160px;
            margin: 12px auto 8px;
            border-radius: 8px;
            object-fit: cover;
            object-position: top center;
            display: block;
            border: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .container { padding: 60px 16px 48px; }
            .stats { gap: 12px; }
            .stat { padding: 12px 16px; min-width: 80px; }
            .stat-value { font-size: 22px; }
            .games-grid { grid-template-columns: 1fr; }
            .game-card { padding: 24px; }
            .game-header { gap: 12px; }
            .game-icon { width: 48px; height: 48px; font-size: 22px; }
            .game-title { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">5</div>
                    <div class="stat-label">款游戏 (Games)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-plays">0</div>
                    <div class="stat-label">总游玩 (Plays)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-time">0</div>
                    <div class="stat-label">总时长 (Time)</div>
                </div>
            </div>
            <div style="margin-top: 32px;">
                <button onclick="openDonateModal()" class="coffee-btn" title="Buy me a coffee!">
                    ☕ 请我喝杯咖啡 (Buy Me a Coffee)
                </button>
            </div>
        </header>

        <!-- Donate Modal -->
        <div id="donate-modal" class="donate-modal" onclick="closeDonateModal(event)">
            <div class="donate-content" onclick="event.stopPropagation()">
                <div class="donate-close" onclick="closeDonateModal()">×</div>
                <h2>感谢您的支持！💖</h2>
                <p style="color: #666; margin-top: 8px; font-size: 14px;">您的打赏是我开发更多好游戏的最大动力</p>
                
                <h4 style="margin-top: 24px; color: #333;">支持作者 / Support Creator</h4>
                
                <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">
                    <div style="flex: 1; min-width: 150px;">
                        <div style="font-size: 14px; color: #333; font-weight: bold;">🇨🇳 微信赞赏</div>
                        <img src="donate.png?v=4" alt="微信赞赏码" class="donate-qr">
                        <div style="font-size: 12px; color: #999;">(WeChat Pay)</div>
                    </div>
                    <div style="flex: 1; min-width: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <div style="font-size: 14px; color: #333; font-weight: bold; margin-bottom: 16px;">🌍 PayPal</div>
                        <a href="https://www.paypal.me/WuJohn666" target="_blank" style="display: inline-block; padding: 14px 28px; background: #003087; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 15px; transition: background 0.2s; box-shadow: 0 4px 12px rgba(0,48,135,0.3);">
                            💳 Click to Support
                        </a>
                        <div style="font-size: 12px; color: #999; margin-top: 16px;">(Fast & Secure)</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="games-grid" id="games-grid"></div>

        <div class="footer">© 2026 Game Center</div>
    </div>

    <script>
        const games = [
            {
                id: 'zombie', title: '末日枪手<br><span style="font-size:12px;color:#888;">Zombie Shooter</span>', emoji: '🔫', color: '#ff4500',
                url: 'zombie-shooter/index.html',
                tags: ['射击', '生存', 'Shooter'],
                desc: '抵御源源不断的僵尸，坚持下去！<br>Survive the endless zombie hordes!'
            },
            {
                id: 'tank', title: '坦克大战<br><span style="font-size:12px;color:#888;">Tank Battle</span>', emoji: '🪖', color: '#E7E721',
                url: 'tank-battle/index.html',
                tags: ['双人', '射击', 'Co-op'],
                desc: '经典坦克大战，支持双人对战<br>Classic tank battle, co-op supported'
            },
            {
                id: 'snake', title: '贪吃蛇<br><span style="font-size:12px;color:#888;">Snake</span>', emoji: '🐍', color: '#34C759',
                url: 'snake/index.html',
                tags: ['经典', '休闲', 'Casual'],
                desc: '流畅操作，经典贪吃蛇<br>Classic snake game'
            },
            {
                id: 'kingdom', title: '王国保卫战<br><span style="font-size:12px;color:#888;">Kingdom Rush</span>', emoji: '🏰', color: '#FF9500',
                url: 'kingdom-rush/index.html',
                tags: ['塔防', '策略', 'Tower Defense'],
                desc: '建造防御塔抵御敌人<br>Build towers to defend'
            },
            {
                id: 'calabash', title: '葫芦兄弟<br><span style="font-size:12px;color:#888;">Calabash Bros</span>', emoji: '🎃', color: '#007AFF',
                url: 'calabash-brothers/index.html',
                tags: ['冒险', '经典', 'Adventure'],
                desc: '七兄弟拯救爷爷<br>Rescue grandpa'
            }
        ];

        const BASE_STATS = {
            'tank': { plays: 1245, time: 1245 * 8 * 60 },
            'calabash': { plays: 156, time: 156 * 15 * 60 },
            'snake': { plays: 2314, time: 2314 * 5 * 60 },
            'zombie': { plays: 54, time: 54 * 20 * 60 },
            'kingdom': { plays: 832, time: 832 * 25 * 60 }
        };

        function loadStats() {
            const stats = localStorage.getItem('gamePortalStats');
            return stats ? JSON.parse(stats) : {};
        }

        function getDisplayStats() {
            const realStats = loadStats();
            let displayStats = {};
            for (const game of games) {
                const id = game.id;
                const base = BASE_STATS[id] || { plays: 0, time: 0 };
                const real = realStats[id] || { plays: 0, time: 0 };
                displayStats[id] = {
                    plays: base.plays + real.plays,
                    time: base.time + real.time
                };
            }
            return displayStats;
        }

        function saveStats(stats) {
            localStorage.setItem('gamePortalStats', JSON.stringify(stats));
        }

        function trackGame(gameId) {
            const stats = loadStats();
            if (!stats[gameId]) stats[gameId] = { plays: 0, time: 0 };
            stats[gameId].plays++;
            saveStats(stats);
            const startTime = Date.now();
            window.onbeforeunload = () => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const currentStats = loadStats();
                if (currentStats[gameId]) {
                    currentStats[gameId].time += elapsed;
                    saveStats(currentStats);
                }
            };
        }

        function formatTime(seconds) {
            if (seconds < 60) return seconds + '秒';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分';
            return Math.floor(seconds / 3600) + '时' + Math.floor((seconds % 3600) / 60) + '分';
        }

        function getTotalStats() {
            const stats = getDisplayStats();
            let totalPlays = 0, totalTime = 0;
            for (const key in stats) {
                totalPlays += stats[key].plays || 0;
                totalTime += stats[key].time || 0;
            }
            return { plays: totalPlays, time: totalTime };
        }

        function renderGames() {
            const stats = getDisplayStats();
            const grid = document.getElementById('games-grid');
            const sortedGames = [...games].sort((a, b) => (stats[b.id]?.plays || 0) - (stats[a.id]?.plays || 0));

            grid.innerHTML = sortedGames.map(game => {
                const gameStats = stats[game.id] || { plays: 0, time: 0 };
                return `
                    <div class="game-card" style="--card-color: ${game.color}" onclick="window.open('${game.url}', '_blank')">
                        <div class="game-header">
                            <div class="game-icon" style="background: ${game.color}15">${game.emoji}</div>
                            <div>
                                <div class="game-title">${game.title}</div>
                                <div class="game-stats">
                                    <span>${gameStats.plays} 次(plays)</span>
                                    <span>${formatTime(gameStats.time)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="game-desc">${game.desc}</div>
                        <div class="game-tags">
                            ${game.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <a href="${game.url}" class="play-btn" target="_blank" onclick="event.stopPropagation(); trackGame('${game.id}')">
                            开始游戏 / PLAY
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </a>
                    </div>
                `;
            }).join('');
        }
            // Initialize
        const totalStats = getTotalStats();
        document.getElementById('total-plays').innerText = totalStats.plays;
        document.getElementById('total-time').innerText = formatTime(totalStats.time);
        renderGames();

        function openDonateModal() {
            document.getElementById('donate-modal').style.display = 'flex';
        }

        function closeDonateModal(e) {
            // Close if clicking the background or the X button
            if (!e || e.target.id === 'donate-modal' || !e.target.id) {
                document.getElementById('donate-modal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
