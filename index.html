<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 游戏中心 - My Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #0a0a1a;
            --darker: #050510;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--darker);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(253, 121, 168, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(162, 155, 254, 0.08) 0%, transparent 70%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(3deg); }
        }

        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) { width: 300px; height: 300px; background: var(--primary); top: 10%; left: 10%; animation-delay: 0s; }
        .shape:nth-child(2) { width: 200px; height: 200px; background: var(--accent); top: 60%; right: 10%; animation-delay: -5s; }
        .shape:nth-child(3) { width: 150px; height: 150px; background: var(--secondary); bottom: 20%; left: 30%; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(5deg); }
            66% { transform: translateY(20px) rotate(-5deg); }
        }

        .header {
            padding: 40px 20px 30px;
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 10px 40px rgba(108, 92, 231, 0.4);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
            padding: 15px 25px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        .section-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin: 50px 0 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--card-glow) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .game-card:hover::before {
            opacity: 0.1;
        }

        .game-preview {
            height: 120px;
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(255, 255, 255, 0.02) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-preview::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--card-glow), transparent);
            animation: rotate 8s linear infinite;
            opacity: 0.1;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .game-emoji {
            font-size: 50px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
            transition: transform 0.3s ease;
        }

        .game-card:hover .game-emoji {
            transform: scale(1.1) rotate(-5deg);
        }

        .game-content {
            padding: 15px;
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .game-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .game-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .game-stats .icon {
            font-size: 0.85rem;
        }

        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .tag {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
        }

        .play-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
        }

        .rank-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        @media (max-width: 1200px) {
            .games-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 900px) {
            .games-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .games-grid { grid-template-columns: 1fr; padding: 0 15px; }
            .game-preview { height: 100px; }
            .game-emoji { font-size: 40px; }
            .stats-bar { gap: 15px; }
            .stat { padding: 10px 15px; }
            .stat-value { font-size: 1.5rem; }
        }

        .card-tank { --card-glow: #E7E721; }
        .card-snake { --card-glow: #00b894; }
        .card-kingdom { --card-glow: #e17055; }
        .card-calabash { --card-glow: #0984e3; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">🎮</div>
        </div>
        <h1>游戏中心</h1>
        <p class="tagline">精选原创网页游戏，即点即玩</p>
    </header>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value">4</div>
            <div class="stat-label">款游戏</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="total-plays">0</div>
            <div class="stat-label">总游玩次数</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="total-time">0</div>
            <div class="stat-label">总游玩时长</div>
        </div>
    </div>

    <h2 class="section-title">🔥 热门游戏</h2>

    <div class="games-grid" id="games-grid">
        <!-- Games will be inserted by JavaScript -->
    </div>

    <footer class="footer">
        <p class="footer-text">© 2026 游戏中心 · HTML/CSS/JS 纯手工打造</p>
    </footer>

    <script>
        // Game data with localStorage tracking
        const games = [
            {
                id: 'tank',
                title: '坦克大战',
                emoji: '🪖',
                color: '#E7E721',
                cardClass: 'card-tank',
                url: '坦克大战/index.html',
                tags: ['双人', '射击', '1000关'],
                desc: '经典坦克大战，支持双人对战'
            },
            {
                id: 'snake',
                title: '贪吃蛇',
                emoji: '🐍',
                color: '#00b894',
                cardClass: 'card-snake',
                url: '贪吃蛇/index.html',
                tags: ['经典', '休闲'],
                desc: '流畅操作，多种玩法'
            },
            {
                id: 'kingdom',
                title: '王国保卫战',
                emoji: '🏰',
                color: '#e17055',
                cardClass: 'card-kingdom',
                url: '王国保卫战/index.html',
                tags: ['塔防', '策略'],
                desc: '建造防御塔抵御敌人'
            },
            {
                id: 'calabash',
                title: '葫芦兄弟',
                emoji: '🎃',
                color: '#0984e3',
                cardClass: 'card-calabash',
                url: '葫芦兄弟/index.html',
                tags: ['冒险', '经典'],
                desc: '七兄弟拯救爷爷'
            }
        ];

        // Load stats from localStorage
        function loadStats() {
            const stats = localStorage.getItem('gamePortalStats');
            return stats ? JSON.parse(stats) : {};
        }

        // Save stats to localStorage
        function saveStats(stats) {
            localStorage.setItem('gamePortalStats', JSON.stringify(stats));
        }

        // Track game click
        function trackGame(gameId) {
            const stats = loadStats();
            if (!stats[gameId]) {
                stats[gameId] = { plays: 0, time: 0 };
            }
            stats[gameId].plays++;
            saveStats(stats);
            
            // Start tracking time
            const startTime = Date.now();
            window.onbeforeunload = () => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const currentStats = loadStats();
                if (currentStats[gameId]) {
                    currentStats[gameId].time += elapsed;
                    saveStats(currentStats);
                }
            };
        }

        // Format time
        function formatTime(seconds) {
            if (seconds < 60) return seconds + '秒';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分';
            return Math.floor(seconds / 3600) + '时' + Math.floor((seconds % 3600) / 60) + '分';
        }

        // Get total stats
        function getTotalStats() {
            const stats = loadStats();
            let totalPlays = 0;
            let totalTime = 0;
            for (const key in stats) {
                totalPlays += stats[key].plays || 0;
                totalTime += stats[key].time || 0;
            }
            return { plays: totalPlays, time: totalTime };
        }

        // Render games sorted by play count
        function renderGames() {
            const stats = loadStats();
            const grid = document.getElementById('games-grid');
            
            // Sort games by play count (descending)
            const sortedGames = [...games].sort((a, b) => {
                const aPlays = stats[a.id]?.plays || 0;
                const bPlays = stats[b.id]?.plays || 0;
                return bPlays - aPlays;
            });

            grid.innerHTML = sortedGames.map((game, index) => {
                const gameStats = stats[game.id] || { plays: 0, time: 0 };
                const rankBadge = index < 3 ? `<div class="rank-badge">TOP ${index + 1}</div>` : '';
                
                return `
                    <div class="game-card ${game.cardClass}">
                        ${rankBadge}
                        <div class="game-preview">
                            <span class="game-emoji">${game.emoji}</span>
                        </div>
                        <div class="game-content">
                            <h3 class="game-title">${game.title}</h3>
                            <div class="game-stats">
                                <span><span class="icon">👁️</span> ${gameStats.plays} 次</span>
                                <span><span class="icon">⏱️</span> ${formatTime(gameStats.time)}</span>
                            </div>
                            <div class="game-tags">
                                ${game.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                            <a href="${game.url}" class="play-btn" target="_blank" onclick="trackGame('${game.id}')">
                                开始游戏
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M5 12h14M12 5l7 7-7 7"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');

            // Update total stats
            const total = getTotalStats();
            document.getElementById('total-plays').textContent = total.plays;
            document.getElementById('total-time').textContent = formatTime(total.time);
        }

        // Initialize
        renderGames();
    </script>
</body>
</html>
