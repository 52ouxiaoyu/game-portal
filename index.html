<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1d1d1f;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 17px;
            color: #86868b;
            font-weight: 400;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 24px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .stat-label {
            font-size: 12px;
            color: #86868b;
            margin-top: 2px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .game-card {
            background: #fff;
            border-radius: 20px;
            padding: 32px;
            transition: all 0.3s ease;
            border: 1px solid #e5e5e5;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            border-color: transparent;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .game-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .game-title {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .game-stats {
            display: flex;
            gap: 16px;
            margin-top: 4px;
            font-size: 13px;
            color: #86868b;
        }

        .game-desc {
            font-size: 14px;
            color: #1d1d1f;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .game-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 4px 10px;
            background: #f5f5f7;
            border-radius: 6px;
            font-size: 12px;
            color: #1d1d1f;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: #1d1d1f;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            background: #424245;
            transform: scale(1.02);
        }

        .play-btn svg {
            width: 14px;
            height: 14px;
        }

        .footer {
            text-align: center;
            padding: 60px 24px 40px;
            color: #86868b;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container { padding: 60px 20px; }
            h1 { font-size: 32px; }
            .games-grid { grid-template-columns: 1fr; }
            .game-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>游戏中心</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">4</div>
                    <div class="stat-label">款游戏</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-plays">0</div>
                    <div class="stat-label">总游玩</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-time">0</div>
                    <div class="stat-label">总时长</div>
                </div>
            </div>
        </header>

        <div class="games-grid" id="games-grid"></div>

        <div class="footer">© 2026 游戏中心</div>
    </div>

    <script>
        const games = [
            {
                id: 'tank', title: '坦克大战', emoji: '🪖', color: '#E7E721',
                url: 'tank-battle/index.html',
                tags: ['双人', '射击', '1000关'],
                desc: '经典坦克大战，支持双人对战'
            },
            {
                id: 'snake', title: '贪吃蛇', emoji: '🐍', color: '#34C759',
                url: 'snake/index.html',
                tags: ['经典', '休闲'],
                desc: '流畅操作，多种玩法'
            },
            {
                id: 'kingdom', title: '王国保卫战', emoji: '🏰', color: '#FF9500',
                url: 'kingdom-rush/index.html',
                tags: ['塔防', '策略'],
                desc: '建造防御塔抵御敌人'
            },
            {
                id: 'calabash', title: '葫芦兄弟', emoji: '🎃', color: '#007AFF',
                url: 'calabash-brothers/index.html',
                tags: ['冒险', '经典'],
                desc: '七兄弟拯救爷爷'
            }
        ];

        function loadStats() {
            const stats = localStorage.getItem('gamePortalStats');
            return stats ? JSON.parse(stats) : {};
        }

        function saveStats(stats) {
            localStorage.setItem('gamePortalStats', JSON.stringify(stats));
        }

        function trackGame(gameId) {
            const stats = loadStats();
            if (!stats[gameId]) stats[gameId] = { plays: 0, time: 0 };
            stats[gameId].plays++;
            saveStats(stats);
            const startTime = Date.now();
            window.onbeforeunload = () => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const currentStats = loadStats();
                if (currentStats[gameId]) {
                    currentStats[gameId].time += elapsed;
                    saveStats(currentStats);
                }
            };
        }

        function formatTime(seconds) {
            if (seconds < 60) return seconds + '秒';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分';
            return Math.floor(seconds / 3600) + '时' + Math.floor((seconds % 3600) / 60) + '分';
        }

        function getTotalStats() {
            const stats = loadStats();
            let totalPlays = 0, totalTime = 0;
            for (const key in stats) {
                totalPlays += stats[key].plays || 0;
                totalTime += stats[key].time || 0;
            }
            return { plays: totalPlays, time: totalTime };
        }

        function renderGames() {
            const stats = loadStats();
            const grid = document.getElementById('games-grid');
            const sortedGames = [...games].sort((a, b) => (stats[b.id]?.plays || 0) - (stats[a.id]?.plays || 0));

            grid.innerHTML = sortedGames.map(game => {
                const gameStats = stats[game.id] || { plays: 0, time: 0 };
                return `
                    <div class="game-card">
                        <div class="game-header">
                            <div class="game-icon" style="background: ${game.color}20">${game.emoji}</div>
                            <div>
                                <div class="game-title">${game.title}</div>
                                <div class="game-stats">
                                    <span>${gameStats.plays} 次</span>
                                    <span>${formatTime(gameStats.time)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="game-desc">${game.desc}</div>
                        <div class="game-tags">
                            ${game.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <a href="${game.url}" class="play-btn" target="_blank" onclick="trackGame('${game.id}')">
                            开始游戏
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </a>
                    </div>
                `;
            }).join('');

            const total = getTotalStats();
            document.getElementById('total-plays').textContent = total.plays;
            document.getElementById('total-time').textContent = formatTime(total.time);
        }

        renderGames();
    </script>
</body>
</html>
