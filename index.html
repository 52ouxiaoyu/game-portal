<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #fafafa;
            color: #1d1d1f;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 100px 24px 80px;
        }

        header {
            text-align: center;
            margin-bottom: 72px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 48px;
        }

        .stat {
            text-align: center;
            padding: 16px 24px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8e8ed;
            min-width: 100px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 11px;
            color: #86868b;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .game-card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e8e8ed;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border-color: transparent;
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .game-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .game-title {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.2px;
        }

        .game-stats {
            display: flex;
            gap: 12px;
            margin-top: 3px;
            font-size: 12px;
            color: #86868b;
        }

        .game-desc {
            font-size: 13px;
            color: #1d1d1f;
            line-height: 1.5;
            margin-bottom: 14px;
            opacity: 0.8;
        }

        .game-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .tag {
            padding: 3px 8px;
            background: #f5f5f7;
            border-radius: 4px;
            font-size: 11px;
            color: #1d1d1f;
            font-weight: 500;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 11px 20px;
            background: #1d1d1f;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
        }

        .play-btn:hover {
            background: #424245;
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        .play-btn svg {
            width: 14px;
            height: 14px;
            transition: transform 0.2s ease;
        }

        .play-btn:hover svg {
            transform: translateX(2px);
        }

        .footer {
            text-align: center;
            padding: 48px 24px 32px;
            color: #86868b;
            font-size: 11px;
            letter-spacing: 0.3px;
        }

        @media (max-width: 768px) {
            .container { padding: 60px 16px 48px; }
            .stats { gap: 12px; }
            .stat { padding: 12px 16px; min-width: 80px; }
            .stat-value { font-size: 22px; }
            .games-grid { grid-template-columns: 1fr; }
            .game-card { padding: 24px; }
            .game-header { gap: 12px; }
            .game-icon { width: 48px; height: 48px; font-size: 22px; }
            .game-title { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">5</div>
                    <div class="stat-label">款游戏</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-plays">0</div>
                    <div class="stat-label">总游玩</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-time">0</div>
                    <div class="stat-label">总时长</div>
                </div>
            </div>
        </header>

        <div class="games-grid" id="games-grid"></div>

        <div class="footer">© 2026 Game Center</div>
    </div>

    <script>
        const games = [
            {
                id: 'zombie', title: '末日枪手', emoji: '🔫', color: '#ff4500',
                url: 'zombie-shooter/index.html',
                tags: ['射击', '生存'],
                desc: '抵御源源不断的僵尸，坚持下去！'
            },
            {
                id: 'tank', title: '坦克大战', emoji: '🪖', color: '#E7E721',
                url: 'tank-battle/index.html',
                tags: ['双人', '射击', '1000关'],
                desc: '经典坦克大战，支持双人对战'
            },
            {
                id: 'snake', title: '贪吃蛇', emoji: '🐍', color: '#34C759',
                url: 'snake/index.html',
                tags: ['经典', '休闲'],
                desc: '流畅操作，多种玩法'
            },
            {
                id: 'kingdom', title: '王国保卫战', emoji: '🏰', color: '#FF9500',
                url: 'kingdom-rush/index.html',
                tags: ['塔防', '策略'],
                desc: '建造防御塔抵御敌人'
            },
            {
                id: 'calabash', title: '葫芦兄弟', emoji: '🎃', color: '#007AFF',
                url: 'calabash-brothers/index.html',
                tags: ['冒险', '经典'],
                desc: '七兄弟拯救爷爷'
            }
        ];

        function loadStats() {
            const stats = localStorage.getItem('gamePortalStats');
            return stats ? JSON.parse(stats) : {};
        }

        function saveStats(stats) {
            localStorage.setItem('gamePortalStats', JSON.stringify(stats));
        }

        function trackGame(gameId) {
            const stats = loadStats();
            if (!stats[gameId]) stats[gameId] = { plays: 0, time: 0 };
            stats[gameId].plays++;
            saveStats(stats);
            const startTime = Date.now();
            window.onbeforeunload = () => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const currentStats = loadStats();
                if (currentStats[gameId]) {
                    currentStats[gameId].time += elapsed;
                    saveStats(currentStats);
                }
            };
        }

        function formatTime(seconds) {
            if (seconds < 60) return seconds + '秒';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分';
            return Math.floor(seconds / 3600) + '时' + Math.floor((seconds % 3600) / 60) + '分';
        }

        function getTotalStats() {
            const stats = loadStats();
            let totalPlays = 0, totalTime = 0;
            for (const key in stats) {
                totalPlays += stats[key].plays || 0;
                totalTime += stats[key].time || 0;
            }
            return { plays: totalPlays, time: totalTime };
        }

        function renderGames() {
            const stats = loadStats();
            const grid = document.getElementById('games-grid');
            const sortedGames = [...games].sort((a, b) => (stats[b.id]?.plays || 0) - (stats[a.id]?.plays || 0));

            grid.innerHTML = sortedGames.map(game => {
                const gameStats = stats[game.id] || { plays: 0, time: 0 };
                return `
                    <div class="game-card" style="--card-color: ${game.color}" onclick="window.open('${game.url}', '_blank')">
                        <div class="game-header">
                            <div class="game-icon" style="background: ${game.color}15">${game.emoji}</div>
                            <div>
                                <div class="game-title">${game.title}</div>
                                <div class="game-stats">
                                    <span>${gameStats.plays} 次</span>
                                    <span>${formatTime(gameStats.time)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="game-desc">${game.desc}</div>
                        <div class="game-tags">
                            ${game.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <a href="${game.url}" class="play-btn" target="_blank" onclick="event.stopPropagation(); trackGame('${game.id}')">
                            开始游戏
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </a>
                    </div>
                `;
            }).join('');

            const total = getTotalStats();
            document.getElementById('total-plays').textContent = total.plays;
            document.getElementById('total-time').textContent = formatTime(total.time);
        }

        renderGames();
    </script>
</body>
</html>
