<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Battle - NES Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="score-box">
                <span class="p1-color">P1 SCORE</span>
                <span id="p1-score">00000</span>
            </div>
            <div id="mid-info">
                <div id="stage-info">STAGE 1</div>
                <div id="enemies-info">ENEMIES: 20</div>
                <div id="lives-info">LIVES: ❤️x3</div>
            </div>
            <div class="score-box">
                <span class="p2-color">P2 SCORE</span>
                <span id="p2-score">00000</span>
            </div>
        </div>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>坦克大战<br><span style="font-size:24px;">TANK BATTLE</span></h1>
                <p>玩家一 (P1): WASD + 空格(SPACE)</p>
                <p>玩家二 (P2): 方向键(Arrows) + 回车(ENTER)</p>
                <div class="settings">
                    <label>起始关卡 (Level): <input type="number" id="start-level" min="1" max="1000" value="1"></label>
                    <div class="difficulty">
                        <button class="diff-btn active" data-diff="easy">简单 Easy</button>
                        <button class="diff-btn" data-diff="normal">普通 Normal</button>
                        <button class="diff-btn" data-diff="hard">困难 Hard</button>
                    </div>
                </div>
                <button id="start-btn">开始游戏 / START</button>
            </div>
            <div id="game-over-screen" class="screen hidden">
                <h1>游戏结束<br><span style="font-size:24px;">GAME OVER</span></h1>
                <button id="restart-btn">重新开始 / RESTART</button>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="touch-controls" class="hidden">
            <div id="touch-dpad">
                <button class="dpad-btn" data-dir="up">▲</button>
                <button class="dpad-btn" data-dir="left">◄</button>
                <button class="dpad-btn" data-dir="right">►</button>
                <button class="dpad-btn" data-dir="down">▼</button>
            </div>
            <button id="touch-shoot">FIRE</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
