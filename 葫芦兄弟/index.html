let player = null, boss = null, turn = 1, logEntries = [];

function initGame(charId) {
  player = { char: characters[charId], hp: 100, maxHp: 100, power: 15 + charId * 2, maxPower: 60, brave: 30, karma: 0, skills: [characters[charId].skill] };
  boss = { hp: 120, maxHp: 120, power: 18, maxPower: 55, brave: 70, growRate: 1.1 };
  turn = 1; logEntries = [];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  updateUI(); showEvent('intro');
}

function updateUI() {
  document.getElementById('turn').textContent = '回合 ' + turn;
  const warn = document.getElementById('boss-warning');
  if (turn >= 15) warn.textContent = '💀 蛇精即将变得无法战胜！';
  else if (turn >= 10) warn.textContent = '⚠️ 蛇精越来越强了...';
  else if (turn >= 6) warn.textContent = '⚠️ 时间紧迫...';
  else warn.textContent = '';

  document.getElementById('playerStats').innerHTML = `
    <div class="stat-row"><span class="stat-name">生命</span><div class="stat-bar"><div class="stat-fill hp-fill" style="width:${player.hp/player.maxHp*100}%"></div></div><span class="stat-num">${player.hp}/${player.maxHp}</span></div>
    <div class="stat-row"><span class="stat-name">战力</span><div class="stat-bar"><div class="stat-fill power-fill" style="width:${player.power/player.maxPower*100}%"></div></div><span class="stat-num">${player.power}</span></div>
    <div class="stat-row"><span class="stat-name">勇气</span><div class="stat-bar"><div class="stat-fill brave-fill" style="width:${player.brave}%"></div></div><span class="stat-num">${player.brave}</span></div>
    <div class="stat-row"><span class="stat-name">善恶</span><div class="stat-bar"><div class="stat-fill karma-fill" style="width:${Math.min(100,Math.max(0,50+player.karma))}%"></div></div><span class="stat-num">${player.karma>0?'+':''}${player.karma}</span></div>`;

  document.getElementById('bossStats').innerHTML = `
    <div class="stat-row"><span class="stat-name">生命</span><div class="stat-bar"><div class="stat-fill hp-fill" style="width:${boss.hp/boss.maxHp*100}%"></div></div><span class="stat-num">${boss.hp}/${boss.maxHp}</span></div>
    <div class="stat-row"><span class="stat-name">战力</span><div class="stat-bar"><div class="stat-fill power-fill" style="width:${boss.power/boss.maxPower*100}%"></div></div><span class="stat-num">${boss.power}</span></div>
    <div class="stat-row"><span class="stat-name">气势</span><div class="stat-bar"><div class="stat-fill brave-fill" style="width:${boss.brave}%"></div></div><span class="stat-num">${boss.brave}</span></div>`;

  const ratio = player.power / boss.power;
  const analysis = document.getElementById('bossAnalysis');
  if (ratio >= 1.1) { analysis.textContent = '✅ 可以一战！'; analysis.style.color = '#4ecdc4'; }
  else if (ratio >= 0.9) { analysis.textContent = '⚠️ 有风险但可试'; analysis.style.color = '#ffd700'; }
  else if (ratio >= 0.7) { analysis.textContent = '❌ 实力不足'; analysis.style.color = '#ff8844'; }
  else { analysis.textContent = '💀 几乎不可能赢'; analysis.style.color = '#ff6b6b'; }

  let sh = '<div style="color:#666; font-size:10px;">已找到的兄弟 (' + player.skills.length + '/7)：</div>';
  player.skills.forEach(s => { 
    const brother = characters.find(c => c.skill === s);
    sh += `<span class="skill-tag skill-active" style="background:${brother.color}33; border-color:${brother.color}">${brother.icon} ${brother.name}</span>`; 
  });
  const missing = allSkills.filter(s => !player.skills.includes(s));
  if (missing.length > 0) {
    sh += '<div style="color:#666; font-size:10px; margin-top:4px;">未找到：</div>';
    missing.forEach(s => { sh += `<span class="skill-tag">???</span>`; });
  }
  document.getElementById('skills').innerHTML = sh;
  document.getElementById('log').innerHTML = logEntries.slice(-4).map(e => `<div style="font-size:9px;color:${e.color};padding:2px 0;">${e.text}</div>`).join('');
}

function addLog(text, color) { logEntries.push({ text, color: color || '#666' }); }

function typeText(text, callback) {
  let idx = 0; document.getElementById('text').textContent = '';
  const iv = setInterval(() => { if (idx < text.length) { document.getElementById('text').textContent += text[idx]; idx++; } else { clearInterval(iv); if (callback) callback(); } }, 18);
}

function showText(speaker, text, choices) {
  document.getElementById('speaker').textContent = speaker;
  document.getElementById('choices').innerHTML = '';
  typeText(text, () => {
    if (choices) {
      const div = document.getElementById('choices');
      choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn'; btn.textContent = c.text;
        btn.onclick = () => { 
          if (c.data) events._tempData = c.data;
          if (c.effect) applyEffect(c.effect); 
          if (c.next) showEvent(c.next); 
          updateUI(); 
        };
        div.appendChild(btn);
      });
    }
  });
}

function applyEffect(e) {
  if (e.hp) player.hp = Math.max(1, Math.min(player.maxHp, player.hp + e.hp));
  if (e.power) player.power = Math.max(0, Math.min(player.maxPower, player.power + e.power));
  if (e.brave) player.brave = Math.max(0, Math.min(100, player.brave + e.brave));
  if (e.karma) player.karma += e.karma;
  if (e.skill && !player.skills.includes(e.skill)) player.skills.push(e.skill);
  if (e.bossHp) boss.hp = Math.max(0, boss.hp + e.bossHp);
  if (e.bossPower) boss.power = Math.max(0, Math.min(boss.maxPower, boss.power + e.bossPower));
}

function growBoss() {
  const gain = Math.floor(boss.power * 0.12);
  boss.power = Math.min(boss.maxPower, boss.power + gain);
  boss.hp = Math.min(boss.maxHp, boss.hp + 8);
  addLog(`🐍 蛇精修炼中...战力+${gain}`, '#ff6b6b');
}

    if (success) {
      showText(`⚔️ 战斗`, 
        `你与${brother.name}展开激战！\n\n经过一番搏斗，你用强大的力量震醒了他！\n\n「我...我怎么了...」`, 
        [{ text: `${brother.name}恢复清醒！`, next: 'explore', effect: { skill, power: 10, hp: -15 } }]);
    } else {
      showText(`😤 失败`, 
        `${brother.name}的力量太强了！\n\n你被击退了...`, 
        [{ text: '撤退', next: 'explore', effect: { hp: -20 } }]);
    }
  },

  emotion_brother: () => {
    const brother = events._tempData?.brother;
    const skill = events._tempData?.skill;
    const success = player.karma >= 5;
    
    if (success) {
      showText(`😢 ${brother.name}`, 
        `你含泪讲述了爷爷被抓的故事...\n\n${brother.name}的眼眶湿润了...\n\n「爷爷...我想起来了...蛇精是坏人！」`, 
        [{ text: `${brother.name}清醒了！`, next: 'explore', effect: { skill, power: 8, karma: 5 } }]);
    } else {
      showText(`😠 ${brother.name}`, 
        `${brother.name}不为所动...\n\n「废话少说！」`, 
        [{ text: '无奈离开', next: 'explore' }]);
    }
  },

  talk_brother: () => {
    const brother = events._tempData?.brother;
    const dialogues = [
      `${brother.name}说：「${brother.desc}」`,
      `${brother.name}说：「我的性格是${brother.personality}。」`,
      `${brother.name}说：「${brother.motto}」`,
      `${brother.name}说：「我们七兄弟各有本领，团结起来力量更大！」`
    ];
    showText(`💬 ${brother.name}`, 
      dialogues[Math.floor(Math.random() * dialogues.length)], 
      [{ text: '🤝 加入队伍', next: 'explore', effect: { skill: brother.skill, power: 6 } }]);
  },

  npc_encounter: () => {
    const npc = npcs[Math.floor(Math.random() * npcs.length)];
    const good = Math.random() > 0.4;
    if (good) {
      showText(npc.name, npc.desc, [{ text: '🤝 接受', next: 'explore', effect: npc.effectGood }, { text: '👋 离开', next: 'explore' }]);
    } else {
      showText(npc.name, npc.desc + '\n\n⚠️ 感觉不太对劲...', [{ text: '🤝 接受', next: 'explore', effect: npc.effectBad }, { text: '🚫 拒绝', next: 'explore', effect: { brave: 5 } }]);
    }
  },

  enemy_encounter: () => {
    const e = enemies[Math.floor(Math.random() * enemies.length)];
    showText(e.name, e.desc, [
      { text: '⚔️ 战斗', next: 'combat_win', effect: { hp: -e.power * 0.3, power: 3, brave: 5 } },
      { text: '💨 逃跑', next: 'explore', effect: { hp: -3, brave: -3 } }
    ]);
  },

  combat_win: () => {
    const msgs = ['你英勇地击退了敌人！', '战斗胜利！', '你变强了！'];
    showText('✅ 胜利', msgs[Math.floor(Math.random() * msgs.length)], [{ text: '继续', next: 'explore' }]);
  },

  cave_explore: () => {
    const r = Math.random();
    if (r < 0.5) {
      const items = [
        { name: '💰 宝箱', effect: { power: 5, hp: 10 } },
        { name: '📜 秘籍', effect: { power: 8 } },
        { name: '💊 仙丹', effect: { hp: 25 } },
        { name: '🔮 法杖', effect: { power: 6, hp: 8 } }
      ];
      const item = items[Math.floor(Math.random() * items.length)];
      showText(item.name, '你发现了宝藏！', [{ text: '🎉 拿走', next: 'explore', effect: item.effect }]);
    } else {
      const dangers = [
        { name: '💣 炸弹', effect: { hp: -20 }, desc: '踩到炸弹了！' },
        { name: '☠️ 毒气', effect: { hp: -15, power: -2 }, desc: '吸入毒气！' },
        { name: '🪤 陷阱', effect: { hp: -18 }, desc: '掉进陷阱！' },
        { name: '👻 鬼魂', effect: { hp: -12, brave: -8 }, desc: '被鬼魂缠上了！' },
        { name: '💀 骷髅', effect: { hp: -25 }, desc: '骷髅攻击你！' }
      ];
      const d = dangers[Math.floor(Math.random() * dangers.length)];
      showText(d.name, d.desc, [{ text: '😤 倒霉', next: 'explore', effect: d.effect }]);
    }
  },

  trap: () => {
    const traps = [
      { name: '🍌 香蕉皮', desc: '踩到香蕉皮滑倒！', effect: { hp: -10 } },
      { name: '🕳️ 陷阱', desc: '掉进陷阱！', effect: { hp: -15 } },
      { name: '🌪️ 毒雾', desc: '吸入毒雾！', effect: { hp: -8, power: -2 } },
      { name: '😱 幻术', desc: '中了幻术！', effect: { brave: -10 } },
      { name: '🪤 罗网', desc: '被罗网缠住！', effect: { hp: -5, brave: -5 } },
      { name: '⚡ 触电', desc: '踩到电线！', effect: { hp: -12 } },
      { name: '🔥 火焰', desc: '踩到火焰！', effect: { hp: -18 } },
      { name: '❄️ 冰冻', desc: '被冰冻了！', effect: { hp: -10, power: -3 } }
    ];
    const t = traps[Math.floor(Math.random() * traps.length)];
    showText(t.name, t.desc, [{ text: '😤 继续', next: 'explore', effect: t.effect }]);
  },

  lucky_event: () => {
    const luckies = [
      { name: '🍀 幸运草', effect: { hp: 12, power: 3 } },
      { name: '💰 宝箱', effect: { power: 6, hp: 8 } },
      { name: '🌟 灵泉', effect: { hp: 20 } },
      { name: '📜 秘籍', effect: { power: 8 } },
      { name: '🔮 法杖', effect: { power: 5, hp: 10 } },
      { name: '💎 宝石', effect: { power: 7 } },
      { name: '🎁 礼物', effect: { hp: 15, power: 4 } }
    ];
    const l = luckies[Math.floor(Math.random() * luckies.length)];
    showText(l.name, '你发现了好东西！', [{ text: '🎉 太好了', next: 'explore', effect: l.effect }]);
  },

  rest_spot: () => {
    showText('🏕️ 安全地带', '找到安全的地方休息', [
      { text: '💤 睡觉', next: 'explore', effect: { hp: 20 } },
      { text: '🧘 修炼', next: 'explore', effect: { power: 4, hp: 8 } }
    ]);
  },

  boss_entrance: () => {
    document.getElementById('chapter').textContent = '终章：蛇精洞府';
    showText('🐍 蛇精', `哈哈哈！你终于来了！\n\n我现在的战力是 ${boss.power}，生命是 ${boss.hp}！`, [
      { text: '⚔️ 决战！', next: 'boss_fight' },
      { text: '😰 再准备', next: 'explore' }
    ]);
  },

  boss_fight: () => {
    const pDmg = Math.floor(player.power * (1 + player.skills.length * 0.08));
    const bDmg = Math.floor(boss.power * 0.5 * (1 - player.skills.length * 0.04));
    applyEffect({ hp: -bDmg, bossHp: -pDmg });
    if (boss.hp <= 0) showText('🎉 胜利！', `你击败了蛇精！\n造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。`, [{ text: '🏆 结局', next: 'ending' }]);
    else if (player.hp <= 0) showText('💀 失败', `你被打败了...蛇精还剩 ${boss.hp} 生命。`, [{ text: '🔄 重来', next: 'restart' }]);
    else showText('⚔️ 战斗', `造成 ${pDmg} 伤害，受到 ${bDmg} 伤害。\n蛇精还剩 ${boss.hp} 生命！`, [
      { text: '继续', next: 'boss_fight' },
      { text: '撤退', next: 'explore', effect: { hp: 15 } }
    ]);
  },

  ending: () => { document.getElementById('chapter').textContent = '🌟 完美结局'; showText('爷爷', '好孩子！你做到了！', [{ text: '🔄 再玩', next: 'restart' }]); },
  restart: () => location.reload()
};

function showEvent(id) { if (events[id]) events[id](); }

function doAction(action) {
  if (action === 'explore') showEvent('explore');
  else if (action === 'search') {
    growBoss(); turn++;
    if (Math.random() < 0.4) showEvent('find_ally');
    else showText('🔍 寻找', '你仔细搜寻兄弟的踪迹...\n\n但这次没有找到...', [{ text: '继续', next: 'explore' }]);
  }
  else if (action === 'rest') { growBoss(); turn++; applyEffect({ hp: 22 }); showText('💤 休息', '恢复了体力。', [{ text: '继续', next: 'explore' }]); }
  else if (action === 'fight') { if (player.power >= boss.power * 0.85) showEvent('boss_entrance'); else showText('旁白', '现在还不是时候...', [{ text: '继续', next: 'explore' }]); }
}

document.getElementById('charSelect').innerHTML = characters.map(c =>
  `<div class="char-card" style="border-color:${c.color}" onclick="initGame(${c.id})">
    <div style="font-size:24px;">${c.icon}</div>
    <div class="char-name" style="color:${c.color}">${c.name}</div>
    <div class="char-skill">${c.skill}</div>
  </div>`
).join('');
</script>
</body>
</html>
